<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#080808"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Mehdi's Kitchen"/>
<title>Mehdi's Kitchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080808;--bg2:#0f0f0f;--bg3:#161616;
  --border:#1e1e1e;--border2:#2a2a2a;
  --text:#f0ede8;--text2:#7a7a7a;--text3:#3a3a3a;
  --gold:#c8a96e;--gold2:rgba(200,169,110,0.1);--gold-border:rgba(200,169,110,0.18);
  --red:#e05555;
  --serif:'Cormorant Garamond',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
button{cursor:pointer;font-family:var(--sans);border:none;background:none;color:inherit;}
input,textarea,select{font-family:var(--sans);color:var(--text);background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;font-size:14px;width:100%;outline:none;transition:border-color .2s;}
input:focus,textarea:focus,select:focus{border-color:var(--gold);}
select option{background:var(--bg2);}
img{display:block;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
#app{display:flex;flex-direction:column;min-height:100vh;}
main{flex:1;padding-bottom:calc(82px + var(--safe-bot));}
header{position:sticky;top:0;z-index:100;background:rgba(8,8,8,0.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding-top:var(--safe-top);}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;}
.logo{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;}
.logo-mark{color:var(--gold);font-size:13px;}
.logo-text{font-family:var(--serif);font-size:20px;font-weight:400;letter-spacing:0.04em;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.admin-btn{font-size:12px;font-weight:500;letter-spacing:0.06em;padding:6px 14px;border-radius:100px;border:1px solid var(--border2);color:var(--text2);transition:all .2s;}
.admin-btn.on{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}
.test-btn{font-size:11px;font-weight:500;letter-spacing:0.05em;padding:5px 11px;border-radius:100px;border:1px solid var(--border2);color:var(--text3);transition:all .2s;}
.test-btn:active{color:var(--gold);}
.search-wrap{padding:0 16px 12px;}
.search-inner{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 16px;transition:border-color .2s;}
.search-inner:focus-within{border-color:var(--gold-border);}
.search-inner input{background:none;border:none;padding:0;font-size:14px;color:var(--text);flex:1;}
.search-inner input::placeholder{color:var(--text3);}
.search-lbl{font-size:13px;color:var(--text3);flex-shrink:0;font-family:var(--serif);letter-spacing:0.05em;}
.chips{display:flex;gap:7px;overflow-x:auto;padding:0 16px 14px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:6px 14px;border-radius:100px;font-family:var(--serif);font-size:13px;border:1px solid var(--border2);color:var(--text2);background:transparent;transition:all .15s;white-space:nowrap;}
.chip.on{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(8,8,8,0.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding-bottom:var(--safe-bot);height:calc(82px + var(--safe-bot));}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 24px;color:var(--text3);font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;transition:color .2s;}
.bnav-item.on{color:var(--gold);}
.bnav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
.bnav-add{width:48px;height:48px;border-radius:14px;background:linear-gradient(145deg,#c8a96e,#9a7340);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(200,169,110,0.3);}
.bnav-add:active{transform:scale(.93);}
.plus-svg{width:22px;height:22px;stroke:#0a0a0a;stroke-width:2.5;fill:none;}
.home-wrap{padding:20px 0 0;}
.sec-hdr{display:flex;align-items:baseline;justify-content:space-between;padding:0 20px;margin-bottom:14px;}
.sec-title{font-family:var(--serif);font-size:24px;font-weight:400;letter-spacing:0.02em;}
.sec-title span{font-size:13px;color:var(--text2);font-family:var(--sans);font-weight:400;margin-left:6px;}
.sec-link{font-size:12px;color:var(--gold);font-weight:500;letter-spacing:0.06em;text-transform:uppercase;}
.week-row{display:flex;gap:10px;overflow-x:auto;padding:0 20px 4px;scrollbar-width:none;}
.week-row::-webkit-scrollbar{display:none;}
.day-tile{flex-shrink:0;width:120px;border-radius:14px;border:1px solid var(--border);background:var(--bg2);overflow:hidden;cursor:pointer;transition:border-color .18s,transform .18s;}
.day-tile:active{transform:scale(.97);}
.day-tile.today{border-color:var(--gold-border);}
.day-tile.has-recipe{border-color:var(--border2);}
.day-tile.today.has-recipe{border-color:var(--gold);}
.day-thumb{width:100%;height:72px;object-fit:cover;background:var(--bg3);}
.day-thumb-empty{width:100%;height:72px;background:var(--bg3);display:flex;align-items:center;justify-content:center;}
.day-foot{padding:8px 10px 10px;}
.day-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-bottom:3px;}
.day-rname{font-family:var(--serif);font-size:12px;line-height:1.3;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.day-empty-lbl{font-size:11px;color:var(--text3);font-style:italic;}
.recipes-section{padding:26px 0 0;}
.recipe-col{display:flex;flex-direction:column;gap:12px;padding:0 16px;}
.rcard{display:flex;border-radius:14px;overflow:hidden;border:1px solid var(--border);background:var(--bg2);cursor:pointer;transition:border-color .18s,transform .18s;}
.rcard:active{transform:scale(.99);}
.rcard-img{width:100px;flex-shrink:0;background:var(--bg3);overflow:hidden;}
.rcard-img img{width:100%;height:100%;object-fit:cover;}
.rcard-img-fb{width:100%;height:100%;min-height:90px;display:flex;align-items:center;justify-content:center;}
.rcard-body{flex:1;padding:13px 14px;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
.rcard-top{margin-bottom:6px;}
.rcard-cuisine{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;}
.rcard-name{font-family:var(--serif);font-size:16px;font-weight:400;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.rcard-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:7px;}
.rcard-tag{font-size:10px;font-weight:500;padding:3px 9px;border-radius:100px;border:1px solid var(--border2);color:var(--text2);}
.rcard-tag.gold{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}
.rcard-type{font-size:11px;color:var(--text3);font-style:italic;font-family:var(--serif);}
.rcard-day{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);}
.grid-wrap{padding:16px;}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.gcard{border-radius:14px;overflow:hidden;border:1px solid var(--border);background:var(--bg2);cursor:pointer;transition:transform .18s;}
.gcard:active{transform:scale(.98);}
.gcard-img{position:relative;height:130px;overflow:hidden;background:var(--bg3);}
.gcard-img img{width:100%;height:100%;object-fit:cover;}
.gcard-img-fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.gcard-bar{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.65));padding:18px 10px 7px;display:flex;align-items:center;gap:5px;}
.cuisine-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.cuisine-lbl{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;}
.gcard-body{padding:10px 11px 12px;}
.gcard-name{font-family:var(--serif);font-size:15px;font-weight:400;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:7px;}
.gcard-tags{display:flex;flex-wrap:wrap;gap:4px;}
.gtag{font-size:10px;padding:2px 8px;border-radius:100px;border:1px solid var(--border2);color:var(--text2);}
.gtag.gold{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}
.detail-hero{position:relative;height:280px;overflow:hidden;background:var(--bg3);}
.detail-hero img{width:100%;height:100%;object-fit:cover;}
.detail-hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,8,8,0.35) 0%,transparent 45%,rgba(8,8,8,0.92) 100%);}
.detail-back{position:absolute;top:calc(14px + var(--safe-top));left:18px;width:36px;height:36px;border-radius:50%;background:rgba(8,8,8,0.55);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;}
.back-svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;}
.detail-admin-row{position:absolute;top:calc(14px + var(--safe-top));right:18px;display:flex;gap:8px;}
.d-btn{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:500;backdrop-filter:blur(12px);}
.d-btn.edit{background:rgba(8,8,8,0.55);color:var(--text);}
.d-btn.del{background:rgba(224,85,85,0.18);color:var(--red);}
.detail-body{padding:0 20px 32px;}
.detail-top{padding:18px 0 16px;}
.detail-meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.d-cuisine{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;border:1px solid var(--border2);background:var(--bg3);font-size:11px;font-weight:600;letter-spacing:0.08em;}
.d-type{padding:4px 12px;border-radius:100px;border:1px solid var(--border2);background:var(--bg3);font-size:12px;color:var(--text2);font-style:italic;font-family:var(--serif);}
.detail-title{font-family:var(--serif);font-size:30px;font-weight:400;line-height:1.15;letter-spacing:0.01em;margin-bottom:12px;}
.detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.d-tag{padding:4px 12px;border-radius:100px;font-size:11px;font-weight:500;border:1px solid var(--gold-border);color:var(--gold);background:var(--gold2);}
.macros-row{display:grid;grid-template-columns:repeat(4,1fr);background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:22px;}
.mac{padding:12px 6px;text-align:center;border-right:1px solid var(--border);}
.mac:last-child{border-right:none;}
.mac-v{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--gold);display:block;}
.mac-l{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:0.1em;margin-top:2px;}
.sched-row{margin-bottom:22px;}
.sched-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2);margin-bottom:8px;}
.sched-days{display:flex;gap:6px;flex-wrap:wrap;}
.sched-pill{font-size:11px;font-weight:500;padding:6px 13px;border-radius:100px;border:1px solid var(--border2);color:var(--text2);background:var(--bg3);letter-spacing:0.06em;transition:all .18s;cursor:pointer;}
.sched-pill.on{background:var(--gold2);border-color:var(--gold-border);color:var(--gold);}
.sched-pill.saving{opacity:0.5;pointer-events:none;}
.d-sec{margin-bottom:26px;}
.d-sec-title{font-family:var(--serif);font-size:18px;font-weight:400;padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px;letter-spacing:0.02em;}
.d-sub{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin:14px 0 8px;}
.ing-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px;line-height:1.5;}
.ing-row:last-child{border:none;}
.ing-bullet{width:4px;height:4px;border-radius:50%;background:var(--gold);margin-top:8px;flex-shrink:0;opacity:0.7;}
.step-r{display:flex;gap:16px;margin-bottom:18px;align-items:flex-start;}
.step-n{font-family:var(--serif);font-size:28px;font-weight:300;color:var(--gold);opacity:0.5;line-height:1;min-width:28px;margin-top:-2px;}
.step-t{font-size:14px;line-height:1.65;padding-top:3px;}
.planner-wrap{padding:20px 16px;}
.pl-day{margin-bottom:18px;}
.pl-day-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:11px;margin-bottom:8px;}
.pl-day-name{font-size:13px;font-weight:500;color:var(--text2);letter-spacing:0.04em;}
.pl-day-name.today{color:var(--gold);}
.today-badge{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold-border);background:var(--gold2);padding:2px 8px;border-radius:100px;}
.pl-recipe{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;cursor:pointer;transition:border-color .15s;margin-bottom:8px;}
.pl-recipe:active{border-color:var(--gold-border);}
.pl-thumb{width:46px;height:46px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--bg3);}
.pl-name{font-family:var(--serif);font-size:15px;flex:1;}
.pl-cuis{font-size:11px;margin-top:1px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;}
.pl-none{font-size:13px;color:var(--text3);padding:4px 2px;font-style:italic;font-family:var(--serif);}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.72);backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:var(--bg2);border:1px solid var(--border2);border-radius:22px 22px 0 0;width:100%;max-width:520px;}
.sheet-handle{width:36px;height:3px;background:var(--border2);border-radius:2px;margin:14px auto 0;}
.pin-sheet{padding:28px 24px calc(28px + var(--safe-bot));}
.pin-title{font-family:var(--serif);font-size:22px;font-weight:400;margin-bottom:6px;}
.pin-sub{font-size:13px;color:var(--text2);margin-bottom:22px;}
.pin-input{font-size:26px;letter-spacing:10px;text-align:center;padding:15px;border-radius:12px;width:100%;border:1.5px solid var(--border2);background:var(--bg3);color:var(--text);font-weight:600;margin-bottom:14px;}
.pin-input.err{border-color:var(--red);}
.pin-err{font-size:12px;color:var(--red);text-align:center;min-height:18px;margin-bottom:14px;}
.sheet-btns{display:flex;gap:10px;}
.sbtn-cancel{flex:1;padding:14px;border-radius:11px;border:1px solid var(--border2);color:var(--text2);font-size:14px;}
.sbtn-ok{flex:2;padding:14px;border-radius:11px;background:var(--gold);color:#080808;font-size:14px;font-weight:600;}
.editor-sheet{max-height:92vh;display:flex;flex-direction:column;}
.editor-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.editor-title-text{font-family:var(--serif);font-size:20px;font-weight:400;}
.close-x{width:30px;height:30px;border-radius:50%;background:var(--bg3);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:17px;}
.editor-body{flex:1;overflow-y:auto;padding:18px 20px;}
.esec{margin-bottom:22px;}
.esec-title{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.flbl{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;margin-top:10px;}
.flbl:first-child{margin-top:0;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tgrid{display:flex;flex-wrap:wrap;gap:6px;}
.ttog{padding:5px 13px;border-radius:100px;font-size:12px;border:1px solid var(--border2);color:var(--text2);transition:all .12s;}
.ttog.on{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}
.dtog{padding:5px 11px;border-radius:100px;font-size:12px;border:1px solid var(--border2);color:var(--text2);transition:all .12s;}
.dtog.on{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}
.img-prev{width:100%;height:130px;object-fit:cover;border-radius:10px;margin-top:8px;}
.ing-block{background:var(--bg3);border-radius:11px;padding:12px;margin-bottom:9px;}
.ing-sec-inp{background:none;border:none;border-bottom:1px solid var(--border2);border-radius:0;padding:0 0 5px;color:var(--gold);font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;width:100%;outline:none;}
.ing-line{display:flex;gap:7px;margin-bottom:6px;align-items:center;}
.ing-line input{margin-bottom:0;flex:1;}
.step-edit{display:flex;gap:9px;margin-bottom:7px;align-items:flex-start;}
.step-no{width:26px;height:26px;border-radius:50%;background:var(--gold2);color:var(--gold);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.step-edit textarea{flex:1;resize:vertical;min-height:58px;}
.del-x{width:26px;height:26px;border-radius:50%;flex-shrink:0;background:rgba(224,85,85,0.08);color:var(--red);font-size:15px;display:flex;align-items:center;justify-content:center;}
.ghost{font-size:13px;color:var(--gold);padding:7px 0;letter-spacing:0.03em;}
.ghost::before{content:"+ ";}
.macros-g{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.editor-footer{padding:14px 20px calc(14px + var(--safe-bot));border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 30px;text-align:center;}
.empty-title{font-family:var(--serif);font-size:20px;font-weight:300;color:var(--text2);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--text3);}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:14px;}
.spin{width:28px;height:28px;border:1.5px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:rot .7s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}
.load-txt{font-size:13px;color:var(--text3);letter-spacing:0.05em;font-family:var(--serif);}
.toast{position:fixed;z-index:300;bottom:calc(90px + var(--safe-bot));left:50%;transform:translateX(-50%);background:var(--gold);color:#080808;padding:11px 22px;border-radius:100px;font-size:13px;font-weight:500;animation:tin .3s ease;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
.toast.err{background:var(--red);color:#fff;}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
/* RLS warning banner */
.db-warn{margin:12px 16px 0;padding:12px 16px;background:rgba(224,85,85,0.08);border:1px solid rgba(224,85,85,0.22);border-radius:12px;font-size:12px;line-height:1.6;color:#e08a8a;}
.db-warn strong{color:var(--red);display:block;margin-bottom:2px;font-size:13px;}
.db-warn code{font-size:11px;background:rgba(224,85,85,0.12);padding:2px 6px;border-radius:5px;font-family:monospace;}
</style>
</head>
<body>
<div id="app"></div>

// ─── Supabase helpers ────────────────────────────────────────────────────────

async function sbFetch(){
  try{
    const r=await fetch(SB_URL+"/rest/v1/recipes?select=*&order=created_at.asc",{headers:{...sbH,"Accept":"application/json"}});
    if(!r.ok){console.error("sbFetch error:",r.status,r.statusText);return null;}
    const d=await r.json();
    return Array.isArray(d)?d:null;
  }catch(e){console.error("sbFetch error:",e);return null;}
}

async function sbInsert(recipe){
  try{
    const r=await fetch(SB_URL+"/rest/v1/recipes",{method:"POST",headers:{...sbH,"Prefer":"resolution=merge-duplicates"},body:JSON.stringify(recipe)});
    if(!r.ok){
      const txt=await r.text();
      console.error("sbInsert error:",r.status,txt);
      return{ok:false,err:friendlyError(r.status,txt)};
    }
    return{ok:true};
  }catch(e){
    console.error("sbInsert error:",e);
    return{ok:false,err:networkError(e)};
  }
}

async function sbUpdate(recipe){
  try{
    const body=Object.assign({},recipe);
    delete body.id;
    delete body.created_at;
    const r=await fetch(SB_URL+"/rest/v1/recipes?id=eq."+encodeURIComponent(recipe.id),{
      method:"PATCH",
      headers:Object.assign({},sbH,{"Prefer":"return=minimal"}),
      body:JSON.stringify(body)
    });
    if(!r.ok){
      const txt=await r.text();
      console.error("sbUpdate error:",r.status,txt);
      return{ok:false,err:friendlyError(r.status,txt)};
    }
    return{ok:true};
  }catch(e){
    console.error("sbUpdate error:",e);
    return{ok:false,err:networkError(e)};
  }
}

async function sbDelete(id){
  try{
    const r=await fetch(SB_URL+"/rest/v1/recipes?id=eq."+encodeURIComponent(id),{method:"DELETE",headers:sbH});
    if(!r.ok){
      const txt=await r.text();
      console.error("sbDelete error:",r.status,txt);
      return{ok:false,err:friendlyError(r.status,txt)};
    }
    return{ok:true};
  }catch(e){
    console.error("sbDelete error:",e);
    return{ok:false,err:networkError(e)};
  }
}

// Translate HTTP error codes / Supabase JSON into a human-readable string
function friendlyError(status,txt){
  // Supabase returns JSON errors
  try{
    const j=JSON.parse(txt);
    // RLS violation
    if(j.code==="42501"||/row-level security/i.test(j.message||"")){
      return "Permission denied — Supabase RLS is blocking writes. See the banner below for the fix.";
    }
    if(j.message) return j.message;
  }catch{}
  if(status===401||status===403) return "Permission denied ("+status+") — check Supabase RLS policies";
  if(status===0)  return "Network error — could not reach Supabase";
  if(status===404) return "Table not found — check your Supabase URL";
  return status+" — "+txt.slice(0,120);
}

function networkError(e){
  if(/failed to fetch/i.test(e.message||"")) return "Network error — check your internet connection";
  return e.message||"Unknown error";
}

// Quick write-permission test (called from admin "Test DB" button)
async function testWritePermission(){
  showToast("Testing DB write…");
  // Try to PATCH the first recipe's schedule with its current value (a no-op)
  if(!S.recipes.length){showToast("No recipes to test with",true);return;}
  const r=S.recipes[0];
  const res=await sbUpdate(r);
  if(res.ok){
    showToast("✓ DB writes working!");
    ss({dbError:null});
  } else {
    showToast("Write failed: "+res.err,true);
    // If it looks like an RLS problem, show the warning banner
    if(/permission|rls|row-level/i.test(res.err)){
      ss({dbError:"rls"});
    }
  }
}

function todayIdx(){const d=new Date().getDay();return d===0?6:d-1;}
function orderedDays(){const i=todayIdx();return[...DAYS.slice(i),...DAYS.slice(0,i)];}
function todayName(){return DAYS[todayIdx()];}

async function checkUrlImport(recipes){
  try{
    const p=new URLSearchParams(window.location.search);
    const enc=p.get("recipe");
    if(!enc)return recipes;
    const recipe=JSON.parse(atob(decodeURIComponent(enc)));
    if(!recipe||!recipe.name)return recipes;
    if(!recipes.find(function(r){return r.id===recipe.id;})){
      await sbInsert(recipe);
      const fresh=await sbFetch();
      if(fresh&&fresh.length)recipes=fresh;
      else recipes=[...recipes,recipe];
      showToast("Added: "+recipe.name);
    }
    window.history.replaceState({},"",window.location.pathname);
    return recipes;
  }catch{return recipes;}
}

function buildRcard(recipe){
  const card=el("div","rcard");const imgWrap=el("div","rcard-img");
  const img=document.createElement("img");img.src=recipe.image||"";img.alt=recipe.name||"";
  img.style.cssText="width:100%;height:100%;object-fit:cover;";
  img.onerror=function(){try{img.replaceWith(imgFb());}catch{}};
  imgWrap.appendChild(img);
  const body=el("div","rcard-body");const top=el("div","rcard-top");
  if(recipe.cuisine){
    const cc=el("p","rcard-cuisine");
    cc.style.color=CUISINE_COLORS[recipe.cuisine]||"#888";
    cc.textContent=recipe.cuisine;
    top.appendChild(cc);
  }
  top.appendChild(Object.assign(el("p","rcard-name"),{textContent:recipe.name||""}));
  body.appendChild(top);
  const meta=el("div","rcard-meta");
  (recipe.tags||[]).forEach(function(t){meta.appendChild(Object.assign(el("span","rcard-tag gold"),{textContent:t}));});
  if(recipe.type) meta.appendChild(Object.assign(el("span","rcard-type"),{textContent:recipe.type}));
  if(recipe.schedule&&recipe.schedule.length) meta.appendChild(Object.assign(el("span","rcard-day"),{textContent:recipe.schedule.join(", ")}));
  body.appendChild(meta);card.append(imgWrap,body);
  card.onclick=function(){ss({view:"detail",selected:recipe,prevView:"home"});};
  return card;
}

  if(S.filterTag!=="All")     filtered=filtered.filter(function(r){return r.tags&&r.tags.includes(S.filterTag);});

  if(recipe.cuisine){
    const cp=el("div","d-cuisine");
    const dot=el("span");dot.style.cssText="width:7px;height:7px;border-radius:50%;background:"+(CUISINE_COLORS[recipe.cuisine]||"#888")+";";
    const ct=el("span");ct.style.color=CUISINE_COLORS[recipe.cuisine]||"#888";ct.textContent=recipe.cuisine;
    cp.append(dot,ct);metaRow.appendChild(cp);
  }
  if(recipe.type) metaRow.appendChild(Object.assign(el("div","d-type"),{textContent:recipe.type}));
  top.appendChild(metaRow);
  top.appendChild(Object.assign(el("h1","detail-title"),{textContent:recipe.name||""}));
  if(recipe.tags&&recipe.tags.length){
    const tr=el("div","detail-tags");
    recipe.tags.forEach(function(t){tr.appendChild(Object.assign(el("span","d-tag"),{textContent:t}));});
    top.appendChild(tr);
  }
  if(recipe.macros){
    const mb=el("div","macros-row");
    [{v:recipe.macros.calories,l:"Cal"},{v:(recipe.macros.protein||0)+"g",l:"Protein"},{v:(recipe.macros.carbs||0)+"g",l:"Carbs"},{v:(recipe.macros.fat||0)+"g",l:"Fat"}].forEach(function(m){
      const mc=el("div","mac");
      mc.append(Object.assign(el("span","mac-v"),{textContent:m.v}),Object.assign(el("span","mac-l"),{textContent:m.l}));
      mb.appendChild(mc);
    });
    top.appendChild(mb);
  }

  // ── Schedule pills ──────────────────────────────────────────────────────────
  const schedWrap=el("div","sched-row");
  schedWrap.appendChild(Object.assign(el("p","sched-label"),{textContent:"Schedule for"}));
  const schedDays=el("div","sched-days");
  DAYS.forEach(function(day){
    const currentOn=(recipe.schedule||[]).includes(day);
    const pill=btn(day.slice(0,3),"sched-pill"+(currentOn?" on":""),async function(){
      // Snapshot the state before any async work
      const wasOn=(recipe.schedule||[]).includes(day);
      const newSched=wasOn
        ? (recipe.schedule||[]).filter(function(d){return d!==day;})
        : [...(recipe.schedule||[]),day];

      // Optimistic UI update
      pill.className="sched-pill saving";

      const res=await sbUpdate(Object.assign({},recipe,{schedule:newSched}));

      if(res.ok){
        // Commit to app state
        recipe.schedule=newSched;
        S.recipes=S.recipes.map(function(r){
          return r.id===recipe.id?Object.assign({},r,{schedule:newSched}):r;
        });
        S.selected=Object.assign({},recipe,{schedule:newSched});
        pill.className="sched-pill"+(wasOn?"":" on");
        showToast(wasOn?"Removed from "+day:"Added to "+day);
        // Clear any RLS warning if this succeeded
        if(S.dbError) ss({dbError:null});
      } else {
        // Revert the pill to its original state
        pill.className="sched-pill"+(wasOn?" on":"");
        showToast(res.err,true);
        // Flag RLS issue for the warning banner
        if(/permission|rls|row-level/i.test(res.err)){
          S.dbError="rls"; render();
        }
      }
    });
    schedDays.appendChild(pill);
  });
  schedWrap.appendChild(schedDays);

  // Show RLS banner inline on the detail view if there's a known DB error
  if(S.dbError==="rls"){
    schedWrap.appendChild(buildDbWarn());
  }

  top.appendChild(schedWrap);body.appendChild(top);

  if(recipe.ingredients&&Object.keys(recipe.ingredients).length){
    const sec=el("div","d-sec");
    sec.appendChild(Object.assign(el("p","d-sec-title"),{textContent:"Ingredients"}));
    Object.entries(recipe.ingredients).forEach(function(entry){
      const s=entry[0],items=entry[1];
      if(s) sec.appendChild(Object.assign(el("p","d-sub"),{textContent:s}));
      (items||[]).forEach(function(item){
        const row=el("div","ing-row");
        row.append(el("span","ing-bullet"),Object.assign(el("span"),{textContent:item}));
        sec.appendChild(row);
      });
    });
    body.appendChild(sec);
  }
  if(recipe.steps&&recipe.steps.length){
    const sec=el("div","d-sec");
    sec.appendChild(Object.assign(el("p","d-sec-title"),{textContent:"Method"}));
    recipe.steps.forEach(function(step,i){
      const row=el("div","step-r");
      row.append(Object.assign(el("span","step-n"),{textContent:i+1}),Object.assign(el("span","step-t"),{textContent:step}));
      sec.appendChild(row);
    });
    body.appendChild(sec);
  }
  page.appendChild(body);page.appendChild(buildBnav());return page;
}

function buildPlanner(){
  const page=el("div","planner-wrap");
  const ph=el("div","sec-hdr");ph.style.padding="0 4px";
  const pt=el("span","sec-title");pt.innerHTML='Weekly Planner <span>starting today</span>';
  ph.appendChild(pt);page.appendChild(ph);
  const today=todayName();
  orderedDays().forEach(function(day){
    const dw=el("div","pl-day");const dh=el("div","pl-day-hdr");
    dh.appendChild(Object.assign(el("span","pl-day-name"+(day===today?" today":"")),{textContent:day}));
    if(day===today) dh.appendChild(Object.assign(el("span","today-badge"),{textContent:"Today"}));
    dw.appendChild(dh);
    const recipes=S.recipes.filter(function(r){return r.schedule&&r.schedule.includes(day);});
    if(!recipes.length) dw.appendChild(Object.assign(el("p","pl-none"),{textContent:"Nothing planned"}));
    else recipes.forEach(function(r){
      const row=el("div","pl-recipe");
      const thumb=document.createElement("img");thumb.className="pl-thumb";thumb.src=r.image||"";thumb.alt=r.name||"";
      thumb.onerror=function(){thumb.style.display="none";};
      const info=el("div");
      const nameEl=Object.assign(el("p","pl-name"),{textContent:r.name||""});
      const cuisEl=Object.assign(el("p","pl-cuis"),{textContent:r.cuisine||""});
      cuisEl.style.color=CUISINE_COLORS[r.cuisine]||"#888";
      info.append(nameEl,cuisEl);row.append(thumb,info);
      row.onclick=function(){ss({view:"detail",selected:r,prevView:"planner"});};
      dw.appendChild(row);
    });
    page.appendChild(dw);
  });
  return page;
}

function buildPinModal(){
  const ov=el("div","overlay");const sheet=el("div","sheet");const body=el("div","pin-sheet");
  body.append(
    Object.assign(el("h2","pin-title"),{textContent:"Admin Access"}),
    Object.assign(el("p","pin-sub"),{textContent:"Enter your PIN to continue"})
  );
  const inp=document.createElement("input");inp.type="password";inp.maxLength=4;inp.placeholder="...";inp.className="pin-input";inp.inputMode="numeric";
  const err=Object.assign(el("p","pin-err"),{textContent:""});
  const btns=el("div","sheet-btns");
  const ok=btn("Enter","sbtn-ok",function(){
    if(inp.value===ADMIN_PIN){
      var u={isAdmin:true,showPin:false,pinIntent:null};
      if(S.pinIntent==="addRecipe"){u.showEditor=true;u.editingRecipe=null;}
      ss(u);
    } else {
      inp.className="pin-input err";err.textContent="Incorrect PIN";inp.value="";
      setTimeout(function(){inp.className="pin-input";err.textContent="";},1400);
    }
  });
  inp.onkeydown=function(e){if(e.key==="Enter")ok.click();};
  btns.append(btn("Cancel","sbtn-cancel",function(){ss({showPin:false,pinIntent:null});}),ok);
  body.append(inp,err,btns);sheet.append(el("div","sheet-handle"),body);ov.appendChild(sheet);
  ov.onclick=function(e){if(e.target===ov)ss({showPin:false,pinIntent:null});};
  setTimeout(function(){inp.focus();},80);return ov;
}

function buildEditorModal(recipe){
  const isNew=!recipe;
  let form=recipe?JSON.parse(JSON.stringify(recipe)):{name:"",cuisine:"",tags:[],type:"Main Course",schedule:[],image:"",ingredients:{"":[""]},steps:[""],macros:null};
  const ov=el("div","overlay");const sheet=el("div","sheet editor-sheet");const hdr=el("div","editor-hdr");
  hdr.append(
    Object.assign(el("h2","editor-title-text"),{textContent:isNew?"New Recipe":"Edit Recipe"}),
    btn("x","close-x",function(){ss({showEditor:false,editingRecipe:null});})
  );
  const body=el("div","editor-body");
  function rebuild(){
    body.innerHTML="";
    const s1=el("div","esec");s1.appendChild(Object.assign(el("p","esec-title"),{textContent:"Basic Info"}));
    s1.appendChild(Object.assign(el("label","flbl"),{textContent:"Recipe Name"}));
    const ni=document.createElement("input");ni.type="text";ni.value=form.name;ni.oninput=function(e){form.name=e.target.value;};s1.appendChild(ni);
    s1.appendChild(Object.assign(el("label","flbl"),{textContent:"Image URL"}));
    const ii=document.createElement("input");ii.type="text";ii.value=form.image||"";ii.placeholder="https://...";
    s1.appendChild(ii);
    const prevImg=document.createElement("img");prevImg.className="img-prev";
    prevImg.style.display=form.image?"block":"none";
    if(form.image)prevImg.src=form.image;
    prevImg.onerror=function(){prevImg.style.display="none";};
    s1.appendChild(prevImg);
    ii.oninput=function(e){
      form.image=e.target.value;
      if(form.image){prevImg.src=form.image;prevImg.style.display="block";}
      else{prevImg.style.display="none";}
    };
    const tc=el("div","two");
    const cw=el("div");cw.appendChild(Object.assign(el("label","flbl"),{textContent:"Cuisine"}));
    const cs=document.createElement("select");
    cs.innerHTML='<option value="">Select...</option>'+CUISINE_OPTIONS.map(function(c){return'<option value="'+c+'"'+(form.cuisine===c?' selected':'')+'>'+c+'</option>';}).join("");
    cs.onchange=function(e){form.cuisine=e.target.value;};cw.appendChild(cs);tc.appendChild(cw);
    const tw=el("div");tw.appendChild(Object.assign(el("label","flbl"),{textContent:"Type"}));
    const ts=document.createElement("select");
    ts.innerHTML=TYPE_OPTIONS.map(function(t){return'<option value="'+t+'"'+(form.type===t?' selected':'')+'>'+t+'</option>';}).join("");
    ts.onchange=function(e){form.type=e.target.value;};tw.appendChild(ts);tc.appendChild(tw);
    s1.appendChild(tc);body.appendChild(s1);
    const s2=el("div","esec");s2.appendChild(Object.assign(el("p","esec-title"),{textContent:"Tags"}));
    const tg=el("div","tgrid");
    TAG_OPTIONS.forEach(function(t){
      const on=(form.tags||[]).includes(t);
      tg.appendChild(btn(t,"ttog"+(on?" on":""),function(){
        if((form.tags||[]).includes(t)) form.tags=(form.tags||[]).filter(function(x){return x!==t;});
        else form.tags=[...(form.tags||[]),t];
        rebuild();
      }));
    });
    s2.appendChild(tg);body.appendChild(s2);
    const s3=el("div","esec");s3.appendChild(Object.assign(el("p","esec-title"),{textContent:"Schedule"}));
    const dg=el("div","tgrid");
    DAYS.forEach(function(d){
      const on=(form.schedule||[]).includes(d);
      dg.appendChild(btn(d.slice(0,3),"dtog"+(on?" on":""),function(){
        if((form.schedule||[]).includes(d)) form.schedule=(form.schedule||[]).filter(function(x){return x!==d;});
        else form.schedule=[...(form.schedule||[]),d];
        rebuild();
      }));
    });
    s3.appendChild(dg);body.appendChild(s3);
    const s4=el("div","esec");s4.appendChild(Object.assign(el("p","esec-title"),{textContent:"Ingredients"}));
    Object.entries(form.ingredients).forEach(function(entry){
      const sec=entry[0],items=entry[1];const block=el("div","ing-block");
      const keyRef={v:sec};
      const sn=document.createElement("input");sn.className="ing-sec-inp";sn.type="text";sn.value=sec;sn.placeholder="Section name";
      sn.oninput=function(e){
        const newKey=e.target.value;const newIngs={};
        Object.entries(form.ingredients).forEach(function(kv){newIngs[kv[0]===keyRef.v?newKey:kv[0]]=kv[1];});
        form.ingredients=newIngs;
        keyRef.v=newKey;
      };
      block.appendChild(sn);
      items.forEach(function(item,i){
        const row=el("div","ing-line");
        const inp=document.createElement("input");inp.type="text";inp.value=item;inp.placeholder="e.g. 2 cups flour";
        inp.oninput=function(e){const l=form.ingredients[keyRef.v].slice();l[i]=e.target.value;form.ingredients[keyRef.v]=l;};
        const dx=btn("x","del-x",function(){form.ingredients[keyRef.v]=form.ingredients[keyRef.v].filter(function(_,j){return j!==i;});rebuild();});
        row.append(inp,dx);block.appendChild(row);
      });
      block.appendChild(btn("Add ingredient","ghost",function(){form.ingredients[keyRef.v]=[...form.ingredients[keyRef.v],""];rebuild();}));
      s4.appendChild(block);
    });
    s4.appendChild(btn("Add section","ghost",function(){form.ingredients["New Section"]=[""];rebuild();}));
    body.appendChild(s4);
    const s5=el("div","esec");s5.appendChild(Object.assign(el("p","esec-title"),{textContent:"Method"}));
    (form.steps||[]).forEach(function(step,i){
      const row=el("div","step-edit");
      const num=Object.assign(el("span","step-no"),{textContent:i+1});
      const ta=document.createElement("textarea");ta.value=step;ta.placeholder="Step "+(i+1);ta.oninput=function(e){form.steps[i]=e.target.value;};
      const dx=btn("x","del-x",function(){form.steps=form.steps.filter(function(_,j){return j!==i;});rebuild();});
      row.append(num,ta,dx);s5.appendChild(row);
    });
    s5.appendChild(btn("Add step","ghost",function(){form.steps=[...(form.steps||[]),""];rebuild();}));
    body.appendChild(s5);
    const s6=el("div","esec");s6.appendChild(Object.assign(el("p","esec-title"),{textContent:"Macros (per serving)"}));
    const mg=el("div","macros-g");const m=form.macros||{};
    [{k:"calories",l:"Calories"},{k:"protein",l:"Protein"},{k:"carbs",l:"Carbs"},{k:"fat",l:"Fat"}].forEach(function(x){
      const w=el("div");w.appendChild(Object.assign(el("label","flbl"),{textContent:x.l}));
      const inp=document.createElement("input");inp.type="number";inp.value=m[x.k]||"";inp.inputMode="numeric";
      inp.oninput=function(e){form.macros=Object.assign({},form.macros||{});form.macros[x.k]=Number(e.target.value)||0;};
      w.appendChild(inp);mg.appendChild(w);
    });
    s6.appendChild(mg);body.appendChild(s6);
  }
  rebuild();
  const footer=el("div","editor-footer");
  const saveB=btn(isNew?"Add Recipe":"Save Changes","sbtn-ok",async function(){
    if(!form.name.trim()){alert("Recipe name required");return;}
    if(!form.id) form.id=Date.now().toString();
    saveB.textContent="Saving...";saveB.disabled=true;
    const res=(!isNew)?await sbUpdate(form):await sbInsert(form);
    if(res===true||res&&res.ok){
      const recipes=await sbFetch();
      ss({recipes:recipes&&recipes.length?recipes:S.recipes,showEditor:false,editingRecipe:null});
      showToast(isNew?"Recipe added":"Changes saved");
    } else {
      saveB.textContent=isNew?"Add Recipe":"Save Changes";saveB.disabled=false;
      showToast(res&&res.err?res.err:"Save failed",true);
    }
  });
  footer.append(btn("Cancel","sbtn-cancel",function(){ss({showEditor:false,editingRecipe:null});}),saveB);
  sheet.append(el("div","sheet-handle"),hdr,body,footer);ov.appendChild(sheet);
  ov.onclick=function(e){if(e.target===ov)ss({showEditor:false,editingRecipe:null});};
  return ov;
}

async function confirmDelete(id){
  if(confirm("Delete this recipe?")){
    const res=await sbDelete(id);
    if(res===true||res&&res.ok){
      const recipes=await sbFetch();
      ss({recipes:recipes||S.recipes,view:"home",selected:null});
      showToast("Recipe deleted");
    } else {
      showToast((res&&res.err)||"Delete failed",true);
    }
  }
}

async function init(){
  render();
  try{
    let recipes=await sbFetch();
    if(recipes===null){console.warn("Supabase unavailable, using local seed");ss({recipes:SEED,loading:false});return;}
    if(recipes.length===0){await sbSeed();recipes=await sbFetch()||SEED;}
    recipes=await checkUrlImport(recipes);
    ss({recipes:recipes,loading:false});
  }catch(e){
    console.error("Init error:",e);
    ss({recipes:SEED,loading:false});
  }
}
init();
</script>
