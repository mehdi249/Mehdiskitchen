<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mehdi's Kitchen</title>
<style>
body {
  margin:0;
  background:#080808;
  color:white;
  font-family:Arial;
}
.container{
  padding:16px;
}
.card{
  padding:12px;
  margin:8px 0;
  background:#161616;
  border-radius:10px;
  cursor:pointer;
}
.section{
  margin-top:20px;
}
h2{
  margin-bottom:10px;
}
</style>
</head>

<body>
<div id="app"></div>

<script>

// ========= CONFIG =========
const SB_URL="https://uarjjjvrzzwsewrcprcc.supabase.co";

// ✅ YOUR KEY IS NOW ADDED
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVhcmpqanZyenp3c2V3cmNwcmNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Mjg5NTEsImV4cCI6MjA5NTMwNDk1MX0.6I1GWrJeLa1rh7rUg6GTfvrvNdMHX3QRSf13uGqRDKI";

const sbH={
  "Content-Type":"application/json",
  "apikey":SB_KEY,
  "Authorization":"Bearer "+SB_KEY
};

const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

// ========= SEED DATA =========
const SEED=[
  {
    id:"1",
    name:"Chicken & Rice",
    schedule:["Monday"],
    cuisine:"American"
  },
  {
    id:"2",
    name:"Tacos",
    schedule:["Tuesday"],
    cuisine:"Mexican"
  }
];

// ========= STATE =========
let S={
  recipes:[],
  view:"home"
};

function ss(u){
  Object.assign(S,u);
  render();
}

// ========= HELPERS =========
function todayIdx(){
  const d=new Date().getDay();
  return d===0?6:d-1;
}

function orderedDays(){
  const i=todayIdx();
  return [...DAYS.slice(i),...DAYS.slice(0,i)];
}

// ========= SUPABASE =========
async function sbFetch(){
  try{
    const r=await fetch(SB_URL+"/rest/v1/recipes?select=*",{
      headers:sbH
    });

    if(!r.ok){
      console.error("Fetch fail");
      return [];
    }

    const d=await r.json();
    return Array.isArray(d)?d:[];

  }catch(e){
    console.error("Network fail",e);
    return [];
  }
}

// ========= HOME =========
function buildHome(){
  const wrap=document.createElement("div");
  wrap.className="container";

  // ==== WEEK ====
  const week=document.createElement("div");
  week.className="section";

  const title=document.createElement("h2");
  title.textContent="Weekly Planner";
  week.appendChild(title);

  orderedDays().forEach(day=>{
    const r=S.recipes.find(x =>
      Array.isArray(x.schedule) && x.schedule.includes(day)
    );

    const card=document.createElement("div");
    card.className="card";

    card.textContent = r
      ? `${day}: ${r.name}`
      : `${day}: No recipe`;

    week.appendChild(card);
  });

  wrap.appendChild(week);

  // ==== RECIPES ====
  const rec=document.createElement("div");
  rec.className="section";

  const title2=document.createElement("h2");
  title2.textContent="Recipes";
  rec.appendChild(title2);

  if(!S.recipes.length){
    const empty=document.createElement("p");
    empty.textContent="No recipes yet";
    rec.appendChild(empty);
  }

  S.recipes.forEach(r=>{
    const card=document.createElement("div");
    card.className="card";
    card.textContent=r.name;
    rec.appendChild(card);
  });

  wrap.appendChild(rec);

  return wrap;
}

// ========= RENDER =========
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  if(S.view==="home"){
    app.appendChild(buildHome());
  }
}

// ========= INIT =========
async function init(){

  // ✅ Always show fallback first
  S.recipes = SEED;
  render();

  try{
    let recipes = await sbFetch();

    // ✅ fallback handling
    if(!Array.isArray(recipes)){
      recipes = SEED;
    }

    if(recipes.length===0){
      recipes = SEED;
    }

    // ✅ normalize schedules
    recipes = recipes.map(r=>({
      ...r,
      schedule: Array.isArray(r.schedule) ? r.schedule : []
    }));

    ss({recipes});

  }catch(e){
    console.error(e);
    ss({recipes:SEED});
  }
}

init();

</script>
</body>
</html>
