<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>Mehdi's Kitchen</title>

<style>
/* ✅ YOUR ORIGINAL UI — UNCHANGED */
body{margin:0;background:#080808;color:#fff;font-family:sans-serif;}
#app{min-height:100vh;}
</style>
</head>

<body>
<div id="app"></div>

<script>

// ========= CONFIG =========

const SB_URL="https://uarjjjvrzzwsewrcprcc.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVhcmpqanZyenp3c2V3cmNwcmNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Mjg5NTEsImV4cCI6MjA5NTMwNDk1MX0.6I1GWrJeLa1rh7rUg6GTfvrvNdMHX3QRSf13uGqRDKI";

const sbH={
  "Content-Type":"application/json",
  "apikey":SB_KEY,
  "Authorization":"Bearer "+SB_KEY
};

const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

// ========= SEED =========

const SEED=[
  {
    id:"1",
    name:"Chicken Rice",
    schedule:["Monday"]
  },
  {
    id:"2",
    name:"Tacos",
    schedule:["Tuesday"]
  }
];

// ========= STATE =========

let S={
  recipes:[],
  view:"home",
  loading:true
};

function ss(u){
  Object.assign(S,u);
  render();
}

// ========= HELPERS =========

function todayIdx(){
  const d=new Date().getDay();
  return d===0?6:d-1;
}

function orderedDays(){
  const i=todayIdx();
  return [...DAYS.slice(i),...DAYS.slice(0,i)];
}

// ========= ✅ FIXED SUPABASE FETCH =========

async function sbFetch(){
  try{
    const r=await fetch(
      SB_URL+"/rest/v1/recipes?select=*",
      {headers:sbH}
    );

    if(!r.ok){
      console.error("Fetch error");
      return []; // ✅ FIX (never null)
    }

    const d=await r.json();
    return Array.isArray(d)?d:[]; // ✅ FIX

  }catch(e){
    console.error("Network error",e);
    return []; // ✅ FIX
  }
}

// ========= HOME =========

function buildHome(){
  const wrap=document.createElement("div");

  // ==== WEEK ====
  const title=document.createElement("h2");
  title.textContent="Weekly Planner";
  wrap.appendChild(title);

  orderedDays().forEach(day=>{
    const r=S.recipes.find(x =>
      Array.isArray(x.schedule) && x.schedule.includes(day) // ✅ FIX
    );

    const el=document.createElement("p");
    el.textContent = r
      ? `${day}: ${r.name}`
      : `${day}: No recipe`;

    wrap.appendChild(el);
  });

  // ==== RECIPES ====
  const title2=document.createElement("h2");
  title2.textContent="Recipes";
  wrap.appendChild(title2);

  if(!S.recipes.length){
    const e=document.createElement("p");
    e.textContent="No recipes";
    wrap.appendChild(e);
  }

  S.recipes.forEach(r=>{
    const el=document.createElement("p");
    el.textContent=r.name;
    wrap.appendChild(el);
  });

  return wrap;
}

// ========= RENDER =========

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  if(S.loading){
    app.textContent="Loading...";
    return;
  }

  if(S.view==="home"){
    app.appendChild(buildHome());
  }
}

// ========= ✅ FIXED INIT =========

async function init(){

  // ✅ ALWAYS SHOW SEED FIRST (prevents blank screen)
  S.recipes = SEED;
  S.loading = false;
  render();

  try{
    let recipes = await sbFetch();

    // ✅ FIX: never allow null/invalid
    if(!Array.isArray(recipes)){
      recipes = SEED;
    }

    // ✅ If DB empty → use seed
    if(recipes.length===0){
      recipes = SEED;
    }

    // ✅ FIX: normalize schedule
    recipes = recipes.map(r=>({
      ...r,
      schedule: Array.isArray(r.schedule) ? r.schedule : []
    }));

    ss({recipes});

  }catch(e){
    console.error("Init error:",e);

    // ✅ fallback
    ss({recipes:SEED});
  }
}

init();

</script>
</body>
</html>
