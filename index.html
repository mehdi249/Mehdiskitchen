<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#080808"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Mehdi's Kitchen"/>
<title>Mehdi's Kitchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080808;
  --bg2:#0f0f0f;
  --bg3:#161616;
  --bg4:#1e1e1e;
  --border:#1e1e1e;
  --border2:#2a2a2a;
  --text:#f0ede8;
  --text2:#7a7a7a;
  --text3:#3a3a3a;
  --gold:#c8a96e;
  --gold2:rgba(200,169,110,0.1);
  --gold-border:rgba(200,169,110,0.18);
  --red:#e05555;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
button{cursor:pointer;font-family:var(--sans);border:none;background:none;color:inherit;}
input,textarea,select{font-family:var(--sans);color:var(--text);background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;font-size:14px;width:100%;outline:none;transition:border-color .2s;}
input:focus,textarea:focus,select:focus{border-color:var(--gold);}
select option{background:var(--bg2);}
img{display:block;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── SHELL ── */
#app{display:flex;flex-direction:column;min-height:100vh;}
main{flex:1;padding-bottom:calc(82px + var(--safe-bot));}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(8,8,8,0.9);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  padding-top:var(--safe-top);
}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;}

/* ── LOGO (original ✦ style) ── */
.logo{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;}
.logo-mark{color:var(--gold);font-size:13px;line-height:1;}
.logo-text{font-family:var(--serif);font-size:20px;font-weight:400;letter-spacing:0.04em;color:var(--text);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.admin-btn{
  font-size:12px;font-weight:500;letter-spacing:0.06em;
  padding:6px 14px;border-radius:100px;
  border:1px solid var(--border2);color:var(--text2);
  transition:all .2s;
}
.admin-btn.on{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}
.admin-btn:active{opacity:.75;}

/* Search bar (recipes page only) */
.search-wrap{padding:0 16px 12px;}
.search-inner{
  display:flex;align-items:center;gap:10px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:12px;padding:10px 16px;
  transition:border-color .2s;
}
.search-inner:focus-within{border-color:var(--gold-border);}
.search-inner input{background:none;border:none;padding:0;font-size:14px;color:var(--text);flex:1;}
.search-inner input::placeholder{color:var(--text3);}
.search-lbl{font-size:13px;color:var(--text3);flex-shrink:0;font-family:var(--serif);letter-spacing:0.05em;}

/* Filter chips */
.chips{display:flex;gap:7px;overflow-x:auto;padding:0 16px 14px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;padding:6px 14px;border-radius:100px;
  font-size:12px;font-weight:400;letter-spacing:0.04em;
  border:1px solid var(--border2);color:var(--text2);
  background:transparent;transition:all .15s;white-space:nowrap;
  font-family:var(--serif);font-size:13px;
}
.chip.on{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}
.chip:active{opacity:.7;}

/* ── BOTTOM NAV ── */
.bnav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(8,8,8,0.94);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;
  padding:8px 20px calc(8px + var(--safe-bot));
}
.bnav-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:6px 24px;color:var(--text3);font-size:10px;
  font-weight:500;letter-spacing:0.06em;text-transform:uppercase;
  transition:color .2s;
}
.bnav-item.on{color:var(--gold);}
.bnav-item:active{opacity:.6;}
.bnav-icon{
  width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
}
/* SVG icons */
.bnav-add{
  width:48px;height:48px;border-radius:14px;
  background:linear-gradient(145deg,#c8a96e 0%,#9a7340 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(200,169,110,0.3);
  transition:transform .15s,box-shadow .15s;flex-shrink:0;
}
.bnav-add:active{transform:scale(.93);box-shadow:0 2px 8px rgba(200,169,110,0.15);}
.plus-svg{width:22px;height:22px;stroke:#0a0a0a;stroke-width:2.5;fill:none;}

/* ── HOME PAGE ── */
.home-wrap{padding:20px 0 0;}

/* Week section */
.sec-hdr{display:flex;align-items:baseline;justify-content:space-between;padding:0 20px;margin-bottom:14px;}
.sec-title{font-family:var(--serif);font-size:24px;font-weight:400;letter-spacing:0.02em;}
.sec-title span{font-size:13px;color:var(--text2);font-family:var(--sans);font-weight:400;margin-left:6px;letter-spacing:0;}
.sec-link{font-size:12px;color:var(--gold);font-weight:500;letter-spacing:0.06em;text-transform:uppercase;}

.week-row{
  display:flex;gap:10px;overflow-x:auto;
  padding:0 20px 4px;scrollbar-width:none;
}
.week-row::-webkit-scrollbar{display:none;}

.day-tile{
  flex-shrink:0;width:120px;border-radius:14px;
  border:1px solid var(--border);background:var(--bg2);
  overflow:hidden;cursor:pointer;
  transition:border-color .18s,transform .18s;
}
.day-tile:active{transform:scale(.97);}
.day-tile.today{border-color:var(--gold-border);}
.day-tile.has-recipe{border-color:var(--border2);}
.day-tile.today.has-recipe{border-color:var(--gold);}
.day-thumb{width:100%;height:72px;object-fit:cover;background:var(--bg3);}
.day-thumb-empty{
  width:100%;height:72px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
}
/* Elegant fork/knife SVG placeholder */
.cutlery{width:18px;height:18px;stroke:var(--text3);stroke-width:1.5;fill:none;}
.day-foot{padding:8px 10px 10px;}
.day-label{
  font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--gold);margin-bottom:3px;
}
.day-tile.today .day-label{color:var(--gold);}
.day-rname{
  font-family:var(--serif);font-size:12px;line-height:1.3;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.day-empty-lbl{font-size:11px;color:var(--text3);font-style:italic;}

/* Saved recipes section */
.recipes-section{padding:26px 0 0;}
.recipe-col{display:flex;flex-direction:column;gap:12px;padding:0 16px;}

/* ── RECIPE CARD (original style: horizontal) ── */
.rcard{
  display:flex;border-radius:14px;overflow:hidden;
  border:1px solid var(--border);background:var(--bg2);
  cursor:pointer;transition:border-color .18s,transform .18s;
}
.rcard:active{transform:scale(.99);border-color:var(--border2);}
.rcard-img{
  width:100px;flex-shrink:0;
  background:var(--bg3);overflow:hidden;position:relative;
}
.rcard-img img{width:100%;height:100%;object-fit:cover;}
.rcard-img-fb{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
}
.rcard-body{flex:1;padding:13px 14px;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
.rcard-top{margin-bottom:6px;}
.rcard-cuisine{
  font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  margin-bottom:4px;
}
.rcard-name{
  font-family:var(--serif);font-size:16px;font-weight:400;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.rcard-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:7px;}
.rcard-tag{
  font-size:10px;font-weight:500;padding:3px 9px;border-radius:100px;
  border:1px solid var(--border2);color:var(--text2);letter-spacing:0.03em;
}
.rcard-tag.gold{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}
.rcard-type{font-size:11px;color:var(--text3);font-style:italic;font-family:var(--serif);}
.rcard-day{
  font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--text3);
}

/* ── RECIPES GRID PAGE ── */
.grid-wrap{padding:16px;}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.gcard{
  border-radius:14px;overflow:hidden;border:1px solid var(--border);
  background:var(--bg2);cursor:pointer;transition:transform .18s,border-color .18s;
}
.gcard:active{transform:scale(.98);}
.gcard-img{position:relative;height:130px;overflow:hidden;background:var(--bg3);}
.gcard-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.gcard:active .gcard-img img{transform:scale(1.04);}
.gcard-img-fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.gcard-bar{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,0.65));
  padding:18px 10px 7px;
  display:flex;align-items:center;gap:5px;
}
.cuisine-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.cuisine-lbl{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;}
.gcard-body{padding:10px 11px 12px;}
.gcard-name{
  font-family:var(--serif);font-size:15px;font-weight:400;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:7px;
}
.gcard-tags{display:flex;flex-wrap:wrap;gap:4px;}
.gtag{
  font-size:10px;padding:2px 8px;border-radius:100px;
  border:1px solid var(--border2);color:var(--text2);
}
.gtag.gold{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}

/* ── DETAIL PAGE ── */
.detail-hero{position:relative;height:280px;overflow:hidden;background:var(--bg3);}
.detail-hero img{width:100%;height:100%;object-fit:cover;}
.detail-hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(8,8,8,0.35) 0%,transparent 45%,rgba(8,8,8,0.92) 100%);
}
.detail-back{
  position:absolute;top:calc(14px + var(--safe-top));left:18px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(8,8,8,0.55);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;color:var(--text);
}
.back-svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;}
.detail-admin-row{
  position:absolute;top:calc(14px + var(--safe-top));right:18px;
  display:flex;gap:8px;
}
.d-btn{
  padding:6px 14px;border-radius:100px;font-size:12px;font-weight:500;
  backdrop-filter:blur(12px);letter-spacing:0.04em;
}
.d-btn.edit{background:rgba(8,8,8,0.55);color:var(--text);}
.d-btn.del{background:rgba(224,85,85,0.18);color:var(--red);}
.detail-body{padding:0 20px 32px;}
.detail-top{padding:18px 0 16px;}
.detail-meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.d-cuisine{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:100px;
  border:1px solid var(--border2);background:var(--bg3);
  font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
}
.d-type{
  padding:4px 12px;border-radius:100px;
  border:1px solid var(--border2);background:var(--bg3);
  font-size:12px;color:var(--text2);font-style:italic;font-family:var(--serif);
}
.detail-title{
  font-family:var(--serif);font-size:30px;font-weight:400;line-height:1.15;
  letter-spacing:0.01em;margin-bottom:12px;
}
.detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.d-tag{
  padding:4px 12px;border-radius:100px;font-size:11px;font-weight:500;
  border:1px solid var(--gold-border);color:var(--gold);background:var(--gold2);
}
.macros-row{
  display:grid;grid-template-columns:repeat(4,1fr);
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;margin-bottom:22px;
}
.mac{padding:12px 6px;text-align:center;border-right:1px solid var(--border);}
.mac:last-child{border-right:none;}
.mac-v{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--gold);display:block;}
.mac-l{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:0.1em;margin-top:2px;}
.sched-row{margin-bottom:22px;}
.sched-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2);margin-bottom:8px;}
.sched-days{display:flex;gap:6px;flex-wrap:wrap;}
.sched-pill{
  font-size:11px;font-weight:500;padding:6px 13px;border-radius:100px;
  border:1px solid var(--border2);color:var(--text2);background:var(--bg3);
  letter-spacing:0.06em;transition:all .18s;cursor:pointer;
}
.sched-pill.on{
  background:var(--gold2);border-color:var(--gold-border);color:var(--gold);
}
.sched-pill.saving{opacity:0.5;pointer-events:none;}
.d-sec{margin-bottom:26px;}
.d-sec-title{
  font-family:var(--serif);font-size:18px;font-weight:400;color:var(--text);
  padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px;
  letter-spacing:0.02em;
}
.d-sub{
  font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--gold);margin:14px 0 8px;
}
.ing-row{
  display:flex;align-items:flex-start;gap:10px;
  padding:7px 0;border-bottom:1px solid var(--border);
  font-size:14px;line-height:1.5;
}
.ing-row:last-child{border:none;}
.ing-bullet{
  width:4px;height:4px;border-radius:50%;background:var(--gold);
  margin-top:8px;flex-shrink:0;opacity:0.7;
}
.step-r{display:flex;gap:16px;margin-bottom:18px;align-items:flex-start;}
.step-n{
  font-family:var(--serif);font-size:28px;font-weight:300;color:var(--gold);
  opacity:0.5;line-height:1;min-width:28px;margin-top:-2px;
}
.step-t{font-size:14px;line-height:1.65;color:var(--text);padding-top:3px;}

/* ── PLANNER FULL ── */
.planner-wrap{padding:20px 16px;}
.pl-day{margin-bottom:18px;}
.pl-day-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;background:var(--bg2);border:1px solid var(--border);
  border-radius:11px;margin-bottom:8px;
}
.pl-day-name{font-size:13px;font-weight:500;color:var(--text2);letter-spacing:0.04em;}
.pl-day-name.today{color:var(--gold);}
.today-badge{
  font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--gold);border:1px solid var(--gold-border);
  background:var(--gold2);padding:2px 8px;border-radius:100px;
}
.pl-recipe{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;background:var(--bg2);
  border:1px solid var(--border2);border-radius:12px;
  cursor:pointer;transition:border-color .15s;
}
.pl-recipe:active{border-color:var(--gold-border);}
.pl-thumb{width:46px;height:46px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--bg3);}
.pl-name{font-family:var(--serif);font-size:15px;flex:1;}
.pl-cuis{font-size:11px;margin-top:1px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;}
.pl-none{font-size:13px;color:var(--text3);padding:4px 2px;font-style:italic;font-family:var(--serif);}

/* ── MODALS ── */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.72);backdrop-filter:blur(10px);
  display:flex;align-items:flex-end;justify-content:center;
}
.sheet{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:22px 22px 0 0;
  width:100%;max-width:520px;
}
.sheet-handle{width:36px;height:3px;background:var(--border2);border-radius:2px;margin:14px auto 0;}
/* PIN */
.pin-sheet{padding:28px 24px calc(28px + var(--safe-bot));}
.pin-title{font-family:var(--serif);font-size:22px;font-weight:400;margin-bottom:6px;letter-spacing:0.02em;}
.pin-sub{font-size:13px;color:var(--text2);margin-bottom:22px;}
.pin-input{
  font-size:26px;letter-spacing:10px;text-align:center;
  padding:15px;border-radius:12px;width:100%;
  border:1.5px solid var(--border2);background:var(--bg3);
  color:var(--text);font-family:var(--sans);font-weight:600;
  margin-bottom:6px;
}
.pin-input.err{border-color:var(--red);}
.pin-err{font-size:12px;color:var(--red);text-align:center;min-height:18px;margin-bottom:14px;}
.sheet-btns{display:flex;gap:10px;}
.sbtn-cancel{
  flex:1;padding:14px;border-radius:11px;
  border:1px solid var(--border2);color:var(--text2);font-size:14px;
}
.sbtn-ok{
  flex:2;padding:14px;border-radius:11px;
  background:var(--gold);color:#080808;font-size:14px;font-weight:600;
}
.sbtn-ok:active{opacity:.85;}

/* EDITOR */
.editor-sheet{max-height:92vh;display:flex;flex-direction:column;}
.editor-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.editor-title-text{font-family:var(--serif);font-size:20px;font-weight:400;letter-spacing:0.02em;}
.close-x{
  width:30px;height:30px;border-radius:50%;
  background:var(--bg3);color:var(--text2);
  display:flex;align-items:center;justify-content:center;font-size:17px;
}
.editor-body{flex:1;overflow-y:auto;padding:18px 20px;}
.esec{margin-bottom:22px;}
.esec-title{
  font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;
}
.flbl{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;margin-top:10px;}
.flbl:first-child{margin-top:0;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tgrid{display:flex;flex-wrap:wrap;gap:6px;}
.ttog{
  padding:5px 13px;border-radius:100px;font-size:12px;
  border:1px solid var(--border2);color:var(--text2);
  transition:all .12s;
}
.ttog.on{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}
.dtog{
  padding:5px 11px;border-radius:100px;font-size:12px;
  border:1px solid var(--border2);color:var(--text2);
  transition:all .12s;letter-spacing:0.03em;
}
.dtog.on{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}
.img-prev{width:100%;height:130px;object-fit:cover;border-radius:10px;margin-top:8px;}
.ing-block{background:var(--bg3);border-radius:11px;padding:12px;margin-bottom:9px;}
.ing-sec-inp{
  background:none;border:none;border-bottom:1px solid var(--border2);
  border-radius:0;padding:0 0 5px;color:var(--gold);
  font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  width:100%;outline:none;margin-bottom:8px;
}
.ing-line{display:flex;gap:7px;margin-bottom:6px;align-items:center;}
.ing-line input{margin-bottom:0;flex:1;}
.step-edit{display:flex;gap:9px;margin-bottom:7px;align-items:flex-start;}

/* ── TOAST ── */

}

// ── DAY HELPERS ───────────────────────────────────────────
// Returns today's index in DAYS array (0=Monday … 6=Sunday)
function todayIdx(){
  const d=new Date().getDay(); // 0=Sun,1=Mon…
  return d===0?6:d-1; // convert to Mon=0…Sun=6
}
// Returns DAYS reordered starting from today
function orderedDays(){
  const idx=todayIdx();
  return [...DAYS.slice(idx),...DAYS.slice(0,idx)];
}
function todayName(){return DAYS[todayIdx()];}

// ── URL IMPORT ────────────────────────────────────────────
async function checkUrlImport(recipes){
  try{
    const p=new URLSearchParams(window.location.search);
    const enc=p.get("recipe");
    if(!enc)return recipes;
    const recipe=JSON.parse(atob(decodeURIComponent(enc)));
    if(!recipe||!recipe.name)return recipes;
    const exists=recipes.find(r=>r.id===recipe.id);
    if(!exists){
      await sbInsert(recipe);
      recipes=await sbFetch()||recipes;
      showToast("✦ "+recipe.name+" added");
    }
    window.history.replaceState({},"",window.location.pathname);
    return recipes;
  }catch{return recipes;}
}

    }

    const dl=el("p","day-label");dl.textContent=day.slice(0,3);foot.appendChild(dl);
    if(recipe){const rn=el("p","day-rname");rn.textContent=recipe.name;foot.appendChild(rn);}

// Original horizontal recipe card
function buildRcard(recipe){
  const card=el("div","rcard");
  const imgWrap=el("div","rcard-img");
  const img=document.createElement("img");
  img.src=recipe.image||"";img.alt=recipe.name;img.style.cssText="width:100%;height:100%;object-fit:cover;";
  img.onerror=()=>{img.replaceWith(imgFb());};
  imgWrap.appendChild(img);
  const body=el("div","rcard-body");
  const top=el("div","rcard-top");
  if(recipe.cuisine){
    const cc=el("p","rcard-cuisine");
    cc.style.color=CUISINE_COLORS[recipe.cuisine]||"#888";
    cc.textContent=recipe.cuisine;top.appendChild(cc);
  }
  const name=el("p","rcard-name");name.textContent=recipe.name;top.appendChild(name);
  body.appendChild(top);
  const meta=el("div","rcard-meta");
  (recipe.tags||[]).forEach(t=>{const tg=el("span","rcard-tag gold");tg.textContent=t;meta.appendChild(tg);});
  if(recipe.type){const ty=el("span","rcard-type");ty.textContent=recipe.type;meta.appendChild(ty);}
  if(recipe.schedule&&recipe.schedule.length){
  const dy=el("span","rcard-day");dy.textContent=Array.isArray(recipe.schedule)?recipe.schedule.join(", "):(recipe.schedule||"");meta.appendChild(dy);
  }
  body.appendChild(meta);
  card.append(imgWrap,body);
  card.onclick=()=>ss({view:"detail",selected:recipe,prevView:"home"});
  return card;
}

// ── RECIPES PAGE ──────────────────────────────────────────
function buildRecipesPage(){
  const page=el("div","grid-wrap");
  let filtered=S.recipes;
  if(S.search) filtered=filtered.filter(r=>r.name.toLowerCase().includes(S.search.toLowerCase())||(r.cuisine||"").toLowerCase().includes(S.search.toLowerCase()));
  if(S.filterCuisine!=="All") filtered=filtered.filter(r=>r.cuisine===S.filterCuisine);
  if(S.filterTag!=="All") filtered=filtered.filter(r=>r.tags&&r.tags.includes(S.filterTag));
  if(filtered.length===0){
    const e=el("div","empty");
    const et=el("p","empty-title");et.textContent="Nothing found";
    const es=el("p","empty-sub");es.textContent="Try a different search or filter";
    e.append(et,es);page.appendChild(e);return page;
  }
  const grid=el("div","rgrid");
  filtered.forEach(recipe=>{
    const card=el("div","gcard");
    const imgW=el("div","gcard-img");
    const img=document.createElement("img");img.src=recipe.image||"";img.alt=recipe.name;
    img.onerror=()=>{imgW.innerHTML="";imgW.appendChild(imgFb("gcard-img-fb"));};
    const bar=el("div","gcard-bar");
    const dot=el("span","cuisine-dot");dot.style.background=CUISINE_COLORS[recipe.cuisine]||"#888";
    const cl=el("span","cuisine-lbl");cl.style.color=CUISINE_COLORS[recipe.cuisine]||"#aaa";cl.textContent=recipe.cuisine||"";
    bar.append(dot,cl);imgW.append(img,bar);
    const body=el("div","gcard-body");
    const nm=el("p","gcard-name");nm.textContent=recipe.name;
    const tags=el("div","gcard-tags");
    (recipe.tags||[]).forEach(t=>{const tg=el("span","gtag gold");tg.textContent=t;tags.appendChild(tg);});
    if(recipe.type){const ty=el("span","gtag");ty.textContent=recipe.type;tags.appendChild(ty);}
    body.append(nm,tags);card.append(imgW,body);
    card.onclick=()=>ss({view:"detail",selected:recipe,prevView:"recipes"});
    grid.appendChild(card);
  });
  page.appendChild(grid);
  return page;
}

  if(recipe.macros){
    const mb=el("div","macros-row");
    [{v:recipe.macros.calories,l:"Cal"},{v:recipe.macros.protein+"g",l:"Protein"},{v:recipe.macros.carbs+"g",l:"Carbs"},{v:recipe.macros.fat+"g",l:"Fat"}].forEach(m=>{
      const mc=el("div","mac");
      const mv=el("span","mac-v");mv.textContent=m.v;
      const ml=el("span","mac-l");ml.textContent=m.l;
      mc.append(mv,ml);mb.appendChild(mc);
    });
    top.appendChild(mb);
  }
  // ── Interactive day scheduler ──
  const schedWrap=el("div","sched-row");
  const schedLbl=el("p","sched-label");schedLbl.textContent="Schedule for";
  const schedDays=el("div","sched-days");
  DAYS.forEach(day=>{
    const isOn=(recipe.schedule||[]).includes(day);
    const pill=btn(day.slice(0,3),"sched-pill"+(isOn?" on":""),async()=>{
      // Optimistic UI update
      const wasOn=(recipe.schedule||[]).includes(day);
      const newSched=wasOn?(recipe.schedule||[]).filter(d=>d!==day):[...(recipe.schedule||[]),day];
      // Update in local state immediately
      recipe.schedule=newSched;
      pill.className="sched-pill saving";
      // Persist to Supabase
      const updated={...recipe,schedule:newSched};
      const ok=await sbUpdate(updated);
      if(ok){
        // Update recipes array in state
        S.recipes=S.recipes.map(r=>r.id===recipe.id?{...r,schedule:newSched}:r);
        S.selected={...recipe,schedule:newSched};
        pill.className="sched-pill"+(newSched.includes(day)?" on":"");
        showToast(newSched.includes(day)?"✦ Added to "+day:"Removed from "+day);
      } else {
        // Revert on failure
        recipe.schedule=wasOn?[...(newSched),day]:newSched.filter(d=>d!==day);
        pill.className="sched-pill"+(wasOn?" on":"");
        showToast("Failed to update");
      }
    });
    schedDays.appendChild(pill);
  });
  schedWrap.append(schedLbl,schedDays);
  top.appendChild(schedWrap);
  body.appendChild(top);
  // Ingredients
  if(recipe.ingredients&&Object.keys(recipe.ingredients).length){
    const sec=el("div","d-sec");
    const st=el("p","d-sec-title");st.textContent="Ingredients";sec.appendChild(st);
    Object.entries(recipe.ingredients).forEach(([s,items])=>{
      if(s){const sub=el("p","d-sub");sub.textContent=s;sec.appendChild(sub);}
      items.forEach(item=>{
        const row=el("div","ing-row");
        const dot=el("span","ing-bullet");
        const tx=el("span");tx.textContent=item;
        row.append(dot,tx);sec.appendChild(row);
      });
    });
    body.appendChild(sec);
  }
  // Steps
  if(recipe.steps&&recipe.steps.length){
    const sec=el("div","d-sec");
    const st=el("p","d-sec-title");st.textContent="Method";sec.appendChild(st);
    recipe.steps.forEach((step,i)=>{
      const row=el("div","step-r");
      const num=el("span","step-n");num.textContent=i+1;
      const tx=el("span","step-t");tx.textContent=step;
      row.append(num,tx);sec.appendChild(row);
    });
    body.appendChild(sec);
  }
  page.appendChild(body);
  page.appendChild(buildBnav());
  return page;
}

// ── PLANNER ───────────────────────────────────────────────
function buildPlanner(){
  const page=el("div","planner-wrap");
  const ph=el("div","sec-hdr");ph.style.padding="0 4px";
  const pt=el("span","sec-title");pt.innerHTML=`Weekly Planner <span>starting today</span>`;
  ph.appendChild(pt);page.appendChild(ph);
  const today=todayName();
  orderedDays().forEach(day=>{
    const dw=el("div","pl-day");
    const dh=el("div","pl-day-hdr");
    const dn=el("span","pl-day-name"+(day===today?" today":""));dn.textContent=day;
    dh.appendChild(dn);
    if(day===today){const tb=el("span","today-badge");tb.textContent="Today";dh.appendChild(tb);}
    dw.appendChild(dh);
    const recipes=S.recipes.filter(r=>r.schedule&&r.schedule.includes(day));
    if(recipes.length===0){const ep=el("p","pl-none");ep.textContent="Nothing planned";dw.appendChild(ep);}
    else{
      recipes.forEach(r=>{
        const row=el("div","pl-recipe");
        const thumb=document.createElement("img");
        thumb.className="pl-thumb";thumb.src=r.image||"";thumb.alt=r.name;
        thumb.onerror=()=>thumb.style.display="none";
        const info=el("div");
        const rn=el("p","pl-name");rn.textContent=r.name;
        const rc=el("p","pl-cuis");rc.style.color=CUISINE_COLORS[r.cuisine]||"#888";rc.textContent=r.cuisine||"";
        info.append(rn,rc);row.append(thumb,info);
        row.onclick=()=>ss({view:"detail",selected:r,prevView:"planner"});
        dw.appendChild(row);
      });
    }
    page.appendChild(dw);
  });
  return page;
}

// ── PIN MODAL ─────────────────────────────────────────────
function buildPinModal(){
  const ov=el("div","overlay");
  const sheet=el("div","sheet");
  const handle=el("div","sheet-handle");
  const body=el("div","pin-sheet");
  const title=el("h2","pin-title");title.textContent="Admin Access";
  const sub=el("p","pin-sub");sub.textContent="Enter your PIN to continue";
  const inp=document.createElement("input");
  inp.type="password";inp.maxLength=4;inp.placeholder="••••";inp.className="pin-input";inp.inputMode="numeric";
  const err=el("p","pin-err");
  const btns=el("div","sheet-btns");
  const cancel=btn("Cancel","sbtn-cancel",()=>ss({showPin:false}));
  const ok=btn("Enter","sbtn-ok",()=>{
    if(inp.value===ADMIN_PIN){ss({isAdmin:true,showPin:false});}
    else{inp.className="pin-input err";err.textContent="Incorrect PIN";inp.value="";
    setTimeout(()=>{inp.className="pin-input";err.textContent="";},1400);}
  });
  inp.onkeydown=e=>{if(e.key==="Enter")ok.click();};
  btns.append(cancel,ok);
  body.append(title,sub,inp,err,btns);
  sheet.append(handle,body);ov.appendChild(sheet);
  ov.onclick=e=>{if(e.target===ov)ss({showPin:false});};
  setTimeout(()=>inp.focus(),80);
  return ov;
}

// ── EDITOR MODAL ──────────────────────────────────────────
function buildEditorModal(recipe){
  const isNew=!recipe;
  let form=recipe?JSON.parse(JSON.stringify(recipe)):{
    name:"",cuisine:"",tags:[],type:"Main Course",
    schedule:[],image:"",ingredients:{"":[""]},steps:[""],macros:null
  };
  const ov=el("div","overlay");
  const sheet=el("div","sheet editor-sheet");
  const handle=el("div","sheet-handle");
  // Header
  const hdr=el("div","editor-hdr");
  const title=el("h2","editor-title-text");title.textContent=isNew?"New Recipe":"Edit Recipe";
  const closeB=btn("✕","close-x",()=>ss({showEditor:false,editingRecipe:null}));
  hdr.append(title,closeB);
  // Body
  const body=el("div","editor-body");
  function rebuild(){
    body.innerHTML="";
    const s1=el("div","esec");
    const s1t=el("p","esec-title");s1t.textContent="Basic Info";s1.appendChild(s1t);
    s1.appendChild(Object.assign(el("label","flbl"),{textContent:"Recipe Name"}));
    const ni=document.createElement("input");ni.type="text";ni.value=form.name;ni.oninput=e=>form.name=e.target.value;s1.appendChild(ni);
    s1.appendChild(Object.assign(el("label","flbl"),{textContent:"Image URL"}));
    const ii=document.createElement("input");ii.type="text";ii.value=form.image||"";ii.placeholder="https://…";
    ii.oninput=e=>{form.image=e.target.value;rebuild();};s1.appendChild(ii);
    if(form.image){const p=document.createElement("img");p.src=form.image;p.className="img-prev";p.onerror=()=>p.remove();s1.appendChild(p);}
    const tc=el("div","two");
    const cw=el("div");cw.appendChild(Object.assign(el("label","flbl"),{textContent:"Cuisine"}));
    const cs=document.createElement("select");
    cs.innerHTML=`<option value="">Select…</option>`+CUISINE_OPTIONS.map(c=>`<option value="${c}"${form.cuisine===c?" selected":""}>${c}</option>`).join("");
    cs.onchange=e=>form.cuisine=e.target.value;cw.appendChild(cs);tc.appendChild(cw);
    const tw=el("div");tw.appendChild(Object.assign(el("label","flbl"),{textContent:"Type"}));
    const ts=document.createElement("select");
    ts.innerHTML=TYPE_OPTIONS.map(t=>`<option value="${t}"${form.type===t?" selected":""}>${t}</option>`).join("");
    ts.onchange=e=>form.type=e.target.value;tw.appendChild(ts);tc.appendChild(tw);
    s1.appendChild(tc);body.appendChild(s1);
    // Tags
    const s2=el("div","esec");s2.appendChild(Object.assign(el("p","esec-title"),{textContent:"Tags"}));
    const tg=el("div","tgrid");
    TAG_OPTIONS.forEach(t=>{
      const b=btn(t,"ttog"+(form.tags&&form.tags.includes(t)?" on":""),()=>{
        form.tags=(form.tags||[]).includes(t)?(form.tags||[]).filter(x=>x!==t):[...(form.tags||[]),t];rebuild();
      });tg.appendChild(b);
    });
    s2.appendChild(tg);body.appendChild(s2);
    // Schedule
    const s3=el("div","esec");s3.appendChild(Object.assign(el("p","esec-title"),{textContent:"Schedule"}));
    const dg=el("div","tgrid");
    DAYS.forEach(d=>{
      const b=btn(d.slice(0,3),"dtog"+(form.schedule&&form.schedule.includes(d)?" on":""),()=>{
        form.schedule=(form.schedule||[]).includes(d)?(form.schedule||[]).filter(x=>x!==d):[...(form.schedule||[]),d];rebuild();
      });dg.appendChild(b);
    });
    s3.appendChild(dg);body.appendChild(s3);
    // Ingredients
    const s4=el("div","esec");s4.appendChild(Object.assign(el("p","esec-title"),{textContent:"Ingredients"}));
    Object.entries(form.ingredients).forEach(([sec,items])=>{
      const block=el("div","ing-block");
      const sn=document.createElement("input");
      sn.className="ing-sec-inp";sn.type="text";sn.value=sec;sn.placeholder="Section name";
      sn.oninput=e=>{
        const entries=Object.entries(form.ingredients);
        const idx=entries.findIndex(([k])=>k===sec);
        if(idx>-1){entries[idx]=[e.target.value,entries[idx][1]];form.ingredients=Object.fromEntries(entries);}
      };
      block.appendChild(sn);
      items.forEach((item,i)=>{
        const row=el("div","ing-line");
        const inp=document.createElement("input");inp.type="text";inp.value=item;inp.placeholder="e.g. 2 cups flour";
        inp.oninput=e=>{const l=[...form.ingredients[sec]];l[i]=e.target.value;form.ingredients={...form.ingredients,[sec]:l};};
        const dx=btn("✕","del-x",()=>{const l=form.ingredients[sec].filter((_,j)=>j!==i);form.ingredients={...form.ingredients,[sec]:l};rebuild();});
        row.append(inp,dx);block.appendChild(row);
      });
      block.appendChild(btn("Add ingredient","ghost",()=>{form.ingredients={...form.ingredients,[sec]:[...items,""]};rebuild();}));
      s4.appendChild(block);
    });
    s4.appendChild(btn("Add section","ghost",()=>{form.ingredients={...form.ingredients,"New Section":[""]};rebuild();}));
    body.appendChild(s4);
    // Steps
    const s5=el("div","esec");s5.appendChild(Object.assign(el("p","esec-title"),{textContent:"Method"}));
    (form.steps||[]).forEach((step,i)=>{
      const row=el("div","step-edit");
      const num=el("span","step-no");num.textContent=i+1;
      const ta=document.createElement("textarea");ta.value=step;ta.placeholder=`Step ${i+1}`;ta.oninput=e=>form.steps[i]=e.target.value;
      const dx=btn("✕","del-x",()=>{form.steps=form.steps.filter((_,j)=>j!==i);rebuild();});
      row.append(num,ta,dx);s5.appendChild(row);
    });
    s5.appendChild(btn("Add step","ghost",()=>{form.steps=[...(form.steps||[]),""];rebuild();}));
    body.appendChild(s5);
    // Macros
    const s6=el("div","esec");s6.appendChild(Object.assign(el("p","esec-title"),{textContent:"Macros (per serving)"}));
    const mg=el("div","macros-g");
    const m=form.macros||{};
    [{k:"calories",l:"Calories"},{k:"protein",l:"Protein"},{k:"carbs",l:"Carbs"},{k:"fat",l:"Fat"}].forEach(({k,l})=>{
      const w=el("div");w.appendChild(Object.assign(el("label","flbl"),{textContent:l}));
      const inp=document.createElement("input");inp.type="number";inp.value=m[k]||"";inp.inputMode="numeric";
      inp.oninput=e=>{form.macros={...(form.macros||{})};form.macros[k]=Number(e.target.value)||0;};
      w.appendChild(inp);mg.appendChild(w);
    });
    s6.appendChild(mg);body.appendChild(s6);
  }
  rebuild();
  // Footer
  const footer=el("div","editor-footer");
  const cancelB=btn("Cancel","sbtn-cancel",()=>ss({showEditor:false,editingRecipe:null}));
  const saveB=btn(isNew?"Add Recipe":"Save Changes","sbtn-ok",async()=>{
    if(!form.name.trim()){alert("Recipe name required");return;}
    if(!form.id)form.id=Date.now().toString();
    saveB.textContent="Saving…";saveB.disabled=true;
    const ok=form.id&&!isNew?await sbUpdate(form):await sbInsert(form);
    if(ok){const recipes=await sbFetch();ss({recipes:recipes||S.recipes,showEditor:false,editingRecipe:null});showToast(isNew?"✦ Recipe added":"✦ Changes saved");}
    else{saveB.textContent=isNew?"Add Recipe":"Save Changes";saveB.disabled=false;alert("Failed to save. Check connection.");}
  });
  footer.append(cancelB,saveB);
  sheet.append(handle,hdr,body,footer);
  ov.appendChild(sheet);
  ov.onclick=e=>{if(e.target===ov)ss({showEditor:false,editingRecipe:null});};
  return ov;
}

async function confirmDelete(id){
  if(confirm("Delete this recipe?")){
    await sbDelete(id);
    const recipes=await sbFetch();
    ss({recipes:recipes||S.recipes,view:"home",selected:null});
    showToast("Recipe deleted");
  }
}

// ── INIT ──
async function init(){
  render();
  let recipes=await sbFetch();
  if(!recipes||recipes.length===0){await sbSeed();recipes=await sbFetch();}
  recipes=await checkUrlImport(recipes||[]);
  ss({recipes:recipes||[],loading:false});

  // ── PULL TO REFRESH INDEPENDENT CONTROLLER ──
  let startY = 0;
  let currentY = 0;
  
  // Inject the visual pull indicator element dynamically so you don't have to find the body tag
  let ptr = document.getElementById("ptr-indicator");
  if (!ptr) {
    ptr = document.createElement("div");
    ptr.id = "ptr-indicator";
    ptr.style.cssText = "position:fixed;top:0;left:0;width:100%;height:50px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:#c8a96e;font-family:var(--sans);transform:translateY(-50px);transition:transform 0.15s,opacity 0.15s;pointer-events:none;z-index:1000;background:rgba(8,8,8,0.9);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--border);";
    document.body.prepend(ptr);
  }

  window.addEventListener("touchstart", (e) => {
    if (window.scrollY === 0) {
      startY = e.touches.pageY;
    } else {
      startY = 0;
    }
  }, { passive: true });

  window.addEventListener("touchmove", (e) => {
    if (startY === 0) return;
    currentY = e.touches.pageY;
    const diff = currentY - startY;

    if (diff > 0 && diff < 80) {
      ptr.style.transform = `translateY(${diff - 50}px)`;
      ptr.style.opacity = diff / 80;
      ptr.innerText = diff > 60 ? "🔄 Release to refresh" : "⬇️ Pull to refresh";
    }
  }, { passive: true });

  window.addEventListener("touchend", async () => {
    const diff = currentY - startY;
    startY = 0;
    currentY = 0;

    if (diff > 60) {
      ptr.innerText = "⚡ Refreshing...";
      ptr.style.transform = "translateY(0px)";
      
      let freshRecipes = await sbFetch();
      ss({ recipes: freshRecipes || [], loading: false });
      
      setTimeout(() => {
        ptr.style.transform = "translateY(-50px)";
      }, 600);
    } else {
      ptr.style.transform = "translateY(-50px)";
    }
  });
}
