<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --bg2: #111; --bg3: #181818;
    --border: #1e1e1e; --border2: #2a2a2a;
    --text: #f0ede8; --text2: #999; --text3: #555;
    --gold: #c8a96e; --gold2: rgba(200,169,110,0.12);
    --red: #e05555;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--serif); -webkit-font-smoothing: antialiased; }
  button { cursor: pointer; font-family: inherit; border: none; background: none; }
  input, textarea, select { font-family: var(--sans); color: var(--text); background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 14px; font-size: 14px; width: 100%; outline: none; transition: border-color .2s; }
  input:focus, textarea:focus, select:focus { border-color: var(--gold); }
  select option { background: var(--bg2); }
  img { display: block; }
  ul, ol { list-style: none; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  #app { display: flex; flex-direction: column; min-height: 100vh; }
  header { position: sticky; top: 0; z-index: 50; background: rgba(10,10,10,0.95); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding-top: env(safe-area-inset-top); }
  .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .logo-mark { color: var(--gold); font-size: 14px; }
  .logo-text { font-size: 19px; letter-spacing: .06em; font-weight: 400; }
  nav { display: flex; align-items: center; gap: 4px; }
  .nav-btn { color: var(--text3); font-size: 13px; padding: 7px 13px; border-radius: 6px; transition: all .2s; font-family: var(--sans); }
  .nav-btn.active { color: var(--text); background: var(--bg3); }
  .admin-btn { border: 1px solid var(--border2); color: var(--text3); font-size: 12px; padding: 6px 13px; border-radius: 100px; margin-left: 8px; font-family: var(--sans); transition: all .2s; }
  .admin-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold2); }
  .admin-bar { background: var(--gold2); border-top: 1px solid rgba(200,169,110,.15); padding: 8px 20px; display: flex; align-items: center; justify-content: space-between; }
  .admin-bar-label { font-size: 11px; color: var(--gold); letter-spacing: .12em; text-transform: uppercase; font-family: var(--sans); }
  .add-recipe-btn { background: var(--gold); color: #0a0a0a; font-size: 13px; font-weight: 600; padding: 7px 16px; border-radius: 7px; font-family: var(--sans); }
  main { flex: 1; max-width: 1200px; margin: 0 auto; padding: 36px 20px; width: 100%; }

  .loading { display: flex; align-items: center; justify-content: center; height: 40vh; flex-direction: column; gap: 16px; }
  .loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; }
  .loading-text { font-size: 14px; color: var(--text3); font-family: var(--sans); }
  @keyframes spin { to { transform: rotate(360deg); } }

  .filters { display: flex; gap: 28px; flex-wrap: wrap; margin-bottom: 28px; }
  .filter-group { display: flex; flex-direction: column; gap: 8px; }
  .filter-label { font-size: 10px; letter-spacing: .16em; color: var(--text3); text-transform: uppercase; font-family: var(--sans); }
  .pills { display: flex; gap: 7px; flex-wrap: wrap; }
  .pill { border: 1px solid var(--border2); color: var(--text3); font-size: 13px; padding: 5px 14px; border-radius: 100px; transition: all .2s; font-family: var(--sans); }
  .pill.active { color: var(--text); border-color: var(--text); background: var(--bg3); }
  .recipe-count { font-size: 11px; color: #333; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 22px; font-family: var(--sans); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 22px; }
  .card { background: var(--bg2); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s; cursor: pointer; }
  .card:hover { transform: translateY(-5px); box-shadow: 0 20px 56px rgba(0,0,0,.55); }
  .card-img-wrap { position: relative; height: 210px; overflow: hidden; background: var(--bg3); }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform .5s; }
  .card:hover .card-img-wrap img { transform: scale(1.06); }
  .card-img-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 44px; }
  .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.65) 0%, transparent 55%); }
  .cuisine-badge { position: absolute; top: 11px; left: 11px; font-size: 10px; padding: 3px 10px; border-radius: 100px; color: #fff; letter-spacing: .08em; font-family: var(--sans); text-transform: uppercase; font-weight: 600; }
  .card-body { padding: 15px 17px 17px; }
  .card-title { font-size: 16px; font-weight: 400; line-height: 1.4; margin-bottom: 9px; color: var(--text); }
  .card-meta { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 9px; }
  .tag { font-size: 11px; padding: 3px 8px; border-radius: 4px; color: #fff; font-family: var(--sans); }
  .card-footer { display: flex; justify-content: space-between; align-items: center; }
  .day-pills { display: flex; gap: 5px; flex-wrap: wrap; }
  .day-pill { font-size: 11px; padding: 3px 9px; border-radius: 100px; background: var(--bg3); color: var(--text3); border: 1px solid var(--border2); font-family: var(--sans); }
  .card-admin-btns { display: flex; gap: 4px; }
  .icon-btn { color: var(--text3); font-size: 14px; padding: 4px 7px; border-radius: 5px; transition: all .2s; font-family: var(--sans); }
  .icon-btn.del:hover { color: var(--red); }
  .add-card { background: var(--bg2); border-radius: 12px; border: 2px dashed var(--border2); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 270px; gap: 10px; cursor: pointer; }
  .add-card:hover { border-color: #444; }
  .add-card-plus { font-size: 32px; color: var(--border2); }
  .add-card-label { font-size: 13px; color: var(--text3); font-family: var(--sans); }

  .detail { max-width: 860px; margin: 0 auto; }
  .detail-topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .back-btn { color: var(--text3); font-size: 14px; font-family: var(--sans); transition: color .2s; }
  .back-btn:hover { color: var(--text); }
  .detail-admin-btns { display: flex; gap: 8px; }
  .edit-btn { border: 1px solid var(--border2); color: var(--text3); font-size: 13px; padding: 7px 14px; border-radius: 7px; font-family: var(--sans); transition: all .2s; }
  .edit-btn.del { color: var(--red); border-color: rgba(224,85,85,.3); }
  .hero { position: relative; height: 400px; border-radius: 16px; overflow: hidden; margin-bottom: 30px; background: var(--bg3); }
  .hero img { width: 100%; height: 100%; object-fit: cover; }
  .hero-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 80px; }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.9) 0%, rgba(0,0,0,.2) 55%, transparent 100%); }
  .hero-content { position: absolute; bottom: 28px; left: 28px; right: 28px; }
  .hero-badge { font-size: 11px; padding: 3px 10px; border-radius: 100px; color: #fff; letter-spacing: .08em; font-family: var(--sans); text-transform: uppercase; font-weight: 600; display: inline-block; margin-bottom: 10px; }
  .detail-title { font-size: 30px; font-weight: 400; line-height: 1.2; color: #fff; }
  .hero-tags { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 10px; }
  .macros-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 36px; }
  .macro-box { flex: 1; min-width: 80px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .macro-val { font-size: 22px; color: var(--gold); }
  .macro-key { font-size: 10px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; font-family: var(--sans); }
  .detail-body { display: grid; grid-template-columns: 1fr 1fr; gap: 44px; }
  .section-title { font-size: 10px; letter-spacing: .18em; color: var(--gold); text-transform: uppercase; font-weight: 400; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 11px; font-family: var(--sans); }
  .ing-section { font-size: 14px; color: var(--text3); font-style: italic; margin-bottom: 8px; margin-top: 18px; }
  .ing-section:first-child { margin-top: 0; }
  .ing-list li { display: flex; gap: 9px; align-items: flex-start; margin-bottom: 7px; font-size: 15px; line-height: 1.5; }
  .ing-dot { color: var(--gold); font-size: 8px; margin-top: 7px; flex-shrink: 0; }
  .step-list li { display: flex; gap: 14px; margin-bottom: 20px; align-items: flex-start; }
  .step-num { font-size: 24px; color: var(--border2); font-weight: 700; line-height: 1; flex-shrink: 0; min-width: 30px; font-family: var(--sans); }
  .step-text { font-size: 15px; line-height: 1.75; color: #bbb; padding-top: 3px; }

  .planner-title { font-size: 10px; letter-spacing: .18em; color: var(--gold); text-transform: uppercase; font-weight: 400; margin-bottom: 28px; font-family: var(--sans); }
  .planner-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .day-col { display: flex; flex-direction: column; gap: 8px; }
  .day-header { border-bottom: 1px solid var(--border); padding-bottom: 9px; margin-bottom: 2px; }
  .day-name { display: block; font-size: 13px; color: var(--text); letter-spacing: .05em; }
  .day-count { display: block; font-size: 11px; color: #2e2e2e; margin-top: 2px; font-family: var(--sans); }
  .empty-day { font-size: 11px; color: #1e1e1e; padding: 8px 0; font-family: var(--sans); }
  .planner-card { background: var(--bg2); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); transition: border-color .2s; cursor: pointer; }
  .planner-card:hover { border-color: #333; }
  .planner-img-wrap { position: relative; height: 80px; overflow: hidden; background: var(--bg3); }
  .planner-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .planner-img-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.5) 0%, transparent 100%); }
  .planner-body { padding: 8px 10px 10px; }
  .planner-name { font-size: 12px; line-height: 1.35; color: #bbb; margin-bottom: 5px; }
  .planner-badge { font-size: 10px; padding: 2px 7px; border-radius: 100px; color: #fff; font-family: var(--sans); text-transform: uppercase; font-weight: 600; display: inline-block; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.88); backdrop-filter: blur(10px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; box-shadow: 0 40px 100px rgba(0,0,0,.8); width: 100%; }
  .modal-sm { max-width: 400px; padding: 30px; }
  .modal-lg { max-width: 760px; max-height: 92vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-title { font-size: 22px; font-weight: 400; margin-bottom: 6px; }
  .modal-sub { font-size: 14px; color: var(--text3); margin-bottom: 22px; font-family: var(--sans); }
  .pin-input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; padding: 13px; font-size: 26px; color: var(--text); text-align: center; letter-spacing: 10px; font-family: var(--sans); outline: none; }
  .pin-input.error { border-color: var(--red); }
  .pin-error { color: var(--red); font-size: 13px; text-align: center; margin-top: 8px; font-family: var(--sans); }
  .modal-btns { display: flex; gap: 10px; margin-top: 22px; }
  .btn-cancel { flex: 1; border: 1px solid var(--border2); color: var(--text3); padding: 10px; border-radius: 8px; font-size: 15px; font-family: var(--serif); }
  .btn-confirm { flex: 1; background: var(--gold); color: #0a0a0a; padding: 10px; border-radius: 8px; font-size: 15px; font-weight: 600; font-family: var(--sans); }
  .editor-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 26px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .close-btn { color: var(--text3); font-size: 18px; padding: 4px 8px; border-radius: 5px; font-family: var(--sans); }
  .editor-body { overflow-y: auto; padding: 0 26px; flex: 1; }
  .editor-footer { display: flex; gap: 10px; padding: 16px 26px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .editor-section { padding: 22px 0; border-bottom: 1px solid var(--border); }
  .editor-section:last-child { border-bottom: none; }
  .editor-section-title { font-size: 10px; letter-spacing: .16em; color: var(--gold); text-transform: uppercase; font-weight: 400; margin-bottom: 14px; font-family: var(--sans); }
  .field-label { display: block; font-size: 11px; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; margin-top: 12px; font-family: var(--sans); }
  .field-label:first-child { margin-top: 0; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .check-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
  .check-label { display: flex; align-items: center; gap: 7px; font-size: 14px; color: var(--text2); cursor: pointer; font-family: var(--sans); }
  .check-label input { width: auto; accent-color: var(--gold); }
  .img-preview { width: 100%; height: 130px; object-fit: cover; border-radius: 8px; margin-top: 8px; }
  .ing-block { background: var(--bg3); border-radius: 8px; padding: 13px; margin-bottom: 10px; border: 1px solid var(--border); }
  .ing-block-header { display: flex; gap: 8px; align-items: center; margin-bottom: 9px; }
  .ing-block-header input { flex: 1; font-style: italic; margin-bottom: 0; }
  .ing-row { display: flex; gap: 7px; margin-bottom: 6px; align-items: center; }
  .ing-row input { flex: 1; margin-bottom: 0; }
  .ghost-btn { background: none; border: 1px dashed var(--border2); color: var(--text3); padding: 7px 12px; border-radius: 7px; font-size: 13px; font-family: var(--sans); width: 100%; margin-top: 6px; }
  .step-row { display: flex; gap: 9px; margin-bottom: 9px; align-items: flex-start; }
  .step-row-num { font-size: 20px; color: var(--border2); font-weight: 700; min-width: 26px; padding-top: 10px; font-family: var(--sans); }
  .step-row textarea { flex: 1; min-height: 58px; resize: vertical; margin-bottom: 0; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 14px; font-size: 14px; color: var(--text); font-family: var(--sans); outline: none; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn .3s ease forwards; }
  @keyframes scaleIn { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }
  .scale-in { animation: scaleIn .22s ease forwards; }

  @media (max-width: 700px) {
    main { padding: 24px 14px; }
    .planner-grid { grid-template-columns: repeat(3, 1fr); }
    .detail-body { grid-template-columns: 1fr; gap: 30px; }
    .hero { height: 300px; }
    .two-col { grid-template-columns: 1fr; }
    .editor-body { padding: 0 16px; }
    .editor-header, .editor-footer { padding: 16px; }
  }
  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
    .planner-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>

<div id="app"></div>
<script>
// ── CONFIG ─────────────────────────────────────────────────
const SB_URL = "https://uarjjjvrzzwsewrcprcc.supabase.co";
const SB_KEY = "sb_publishable_Z1tg5pu_fNkzd2NeWErOHA_eFmlsNbj";

const SEED_RECIPES = [
  {
    id:"1", name:"Peruvian Style Chicken with Coconut Rice & Aji Verde",

    ingredients:{"Chicken + Marinade":["1.5 lb / 700g boneless chicken thighs","4 garlic cloves, minced","2 tbsp soy sauce","2 tbsp fresh lime juice (1 lime)","Olive oil","Chili flakes to taste","2 tsp brown sugar","1 tsp ground cumin","1 tbsp smoked paprika","1 tsp dried oregano","Salt and black pepper","1–2 tbsp Aji Amarillo paste (optional)"],"Aji Verde (Green Sauce)":["1 packed cup / 30g fresh cilantro","2–3 fresh jalapeños, seeded","2–3 garlic cloves","⅔ cup / 150g sour cream","2 scallions (green part only)","1 tbsp lime juice","2 tbsp olive oil","Salt and pepper to taste"],"Coconut Rice":["250g / 1¼ cup washed basmati rice (soaked 1 hour, drained)","13.5 oz / 400ml coconut milk","1 tsp salt"],"To Serve":["2–4 corn cobs (grilled or boiled)","Fresh cilantro, chopped","Lime wedges"]},
    steps:["Marinate the chicken — Mix all marinade ingredients with the chicken and let sit 20+ minutes.","Cook the rice — Combine rice, coconut milk, and salt. Bring to a gentle boil, cover and cook on low heat 12–15 minutes. Steam 10 minutes, then fluff.","Make the aji verde — Blend all sauce ingredients until smooth, creamy, and bright green.","Cook the chicken — Sear 5–7 min per side until golden and cooked through. Rest before slicing.","Assemble — Serve chicken over coconut rice with aji verde, corn, cilantro, and lime wedges."],
    macros: null
  },
  {
    id:"2", name:"Chipotle Honey Chicken Tacos",
    cuisine:"Mexican", tags:["High Protein"], type:"Main Course", schedule:["Tuesday"],
    image:"https://modernhoney.com/wp-content/uploads/2024/01/Chipotle-Chicken-Tacos-14-scaled.jpg",
    ingredients:{"Chipotle Honey Chicken":["2 lbs (907g) raw boneless skinless chicken thighs","3 chipotle peppers in adobo","3 tbsp adobo sauce","2 tbsp honey","Juice of 2 limes","5 garlic cloves","1½ tbsp olive oil","1 tsp salt","½ tsp pepper"],"For The Cheese Pull":["2 cups reduced-fat mozzarella"],"Tacos":["6 low cal tortilla wraps","Cilantro","Pico de gallo"],"Green Goddess Sauce":["¾ cup (170g) nonfat Greek yogurt","½ packed cup cilantro","Juice of 2 limes","¼ cup mild pickled jalapeño","1 garlic clove","Salt & pepper","Splash of water"]},
    steps:["Blend chipotle peppers, adobo sauce, honey, lime juice, garlic, olive oil, salt and pepper into a smooth marinade.","Coat chicken thighs in the marinade and let sit for at least 20 minutes.","Sear chicken in a hot pan 5–7 min per side until cooked through and caramelized. Rest, then slice.","Blend all green goddess sauce ingredients until completely smooth.","Warm tortillas, load with sliced chicken, top with mozzarella, pico de gallo, cilantro, and green goddess sauce."],
    macros:{calories:342,protein:34,carbs:11,fat:18}
  }
];

const ADMIN_PIN = "1234";
const CUISINE_COLORS = {Peruvian:"#e8825a",Mexican:"#e05555",Italian:"#4caf72",Asian:"#d4a017",American:"#4a7fd4",Mediterranean:"#8e5fd4","Middle Eastern":"#d45fa0",Other:"#666"};
const TAG_COLORS = {"High Protein":"#c0392b","Quick":"#2980b9","Meal Prep":"#d35400","Vegetarian":"#27ae60","Vegan":"#16a085","Low Fat":"#7d3c98","Make Ahead":"#b7950b","No Cook":"#566573"};
const CUISINE_OPTIONS = ["Peruvian","Mexican","Italian","Asian","American","Mediterranean","Middle Eastern","Other"];
const TAG_OPTIONS = ["High Protein","Quick","Meal Prep","Vegetarian","Vegan","Low Fat","Make Ahead","No Cook"];
const TYPE_OPTIONS = ["Main Course","Breakfast","Appetizer","Side Dish","Dessert","Snack","Beverage","Other"];
const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

// ── SUPABASE API ───────────────────────────────────────────
const sbHeaders = {"Content-Type":"application/json","apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`};

async function sbFetch(recipes) {
  const r = await fetch(`${SB_URL}/rest/v1/recipes?select=*&order=created_at.asc`, {headers:{...sbHeaders,"Accept":"application/json"}});
  return r.ok ? r.json() : [];
}
async function sbInsert(recipe) {
  const r = await fetch(`${SB_URL}/rest/v1/recipes`, {method:"POST",headers:{...sbHeaders,"Prefer":"resolution=merge-duplicates"},body:JSON.stringify(recipe)});
  return r.ok;
}
async function sbUpdate(recipe) {
  const r = await fetch(`${SB_URL}/rest/v1/recipes?id=eq.${recipe.id}`, {method:"PATCH",headers:sbHeaders,body:JSON.stringify(recipe)});
  return r.ok;
}
async function sbDelete(id) {
  const r = await fetch(`${SB_URL}/rest/v1/recipes?id=eq.${id}`, {method:"DELETE",headers:sbHeaders});
  return r.ok;
}
async function sbSeed() {
  await fetch(`${SB_URL}/rest/v1/recipes`, {method:"POST",headers:{...sbHeaders,"Prefer":"resolution=merge-duplicates"},body:JSON.stringify(SEED_RECIPES)});
}

// ── STATE ──────────────────────────────────────────────────
let state = {
  recipes:[], loading:true, view:"gallery", selected:null,
  isAdmin:false, filterCuisine:"All", filterTag:"All",
  showPin:false, showEditor:false, editingRecipe:null
};
function setState(u){Object.assign(state,u);render();}

// ── INIT ───────────────────────────────────────────────────
async function init() {
  render();
  let recipes = await sbFetch();
  if (!recipes || recipes.length === 0) {
    await sbSeed();
    recipes = await sbFetch();
  }
  setState({recipes: recipes||[], loading:false});
}

// ── RENDER ─────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(buildHeader());
  const main = el("main");
  if (state.loading) {
    const load = el("div","loading");
    const spinner = el("div","loading-spinner");
    const txt = el("p","loading-text"); txt.textContent="Loading your recipes...";
    load.append(spinner,txt); main.appendChild(load);
  } else if (state.view==="gallery") main.appendChild(buildGallery());
  else if (state.view==="detail"&&state.selected) main.appendChild(buildDetail(state.selected));
  else if (state.view==="planner") main.appendChild(buildPlanner());
  app.appendChild(main);
  if (state.showPin) app.appendChild(buildPinModal());
  if (state.showEditor) app.appendChild(buildEditor(state.editingRecipe));
}

// ── HEADER ─────────────────────────────────────────────────
function buildHeader() {
  const header = el("header");
  const inner = el("div","header-inner");
  const logo = el("div","logo");
  logo.innerHTML=`<span class="logo-mark">✦</span><span class="logo-text">Mehdi's Kitchen</span>`;
  logo.onclick=()=>setState({view:"gallery",selected:null});
  const nav = el("nav");
  nav.appendChild(navBtn("Recipes", state.view!=="planner", ()=>setState({view:"gallery",selected:null})));
  nav.appendChild(navBtn("Weekly Plan", state.view==="planner", ()=>setState({view:"planner",selected:null})));
  const adminB = btn(state.isAdmin?"✦ Admin":"Admin","admin-btn"+(state.isAdmin?" active":""),()=>{
    if(state.isAdmin) setState({isAdmin:false,showEditor:false});
    else setState({showPin:true});
  });
  nav.appendChild(adminB);
  inner.append(logo,nav); header.appendChild(inner);
  if (state.isAdmin) {
    const bar = el("div","admin-bar");
    const lbl = el("span","admin-bar-label"); lbl.textContent="Admin Mode";
    const addB = btn("+ Add Recipe","add-recipe-btn",()=>setState({showEditor:true,editingRecipe:null}));
    bar.append(lbl,addB); header.appendChild(bar);
  }
  return header;
}
function navBtn(text,active,onClick){return btn(text,"nav-btn"+(active?" active":""),onClick);}

// ── GALLERY ────────────────────────────────────────────────
function buildGallery() {
  const wrap = el("div","fade-in");
  const cuisines = ["All",...new Set(state.recipes.map(r=>r.cuisine).filter(Boolean))];
  const tags = ["All",...new Set(state.recipes.flatMap(r=>r.tags||[]))];
  const filters = el("div","filters");
  filters.appendChild(filterGroup("Cuisine",cuisines,state.filterCuisine,v=>setState({filterCuisine:v}),CUISINE_COLORS));
  filters.appendChild(filterGroup("Tags",tags,state.filterTag,v=>setState({filterTag:v})));
  wrap.appendChild(filters);
  const filtered = state.recipes.filter(r=>{
    return (state.filterCuisine==="All"||r.cuisine===state.filterCuisine)&&
           (state.filterTag==="All"||(r.tags||[]).includes(state.filterTag));
  });
  const count = el("p","recipe-count"); count.textContent=`${filtered.length} recipe${filtered.length!==1?"s":""}`;
  wrap.appendChild(count);
  const grid = el("div","grid");
  filtered.forEach(r=>grid.appendChild(buildCard(r)));
  if (state.isAdmin) {
    const addCard = el("div","add-card");
    addCard.innerHTML=`<span class="add-card-plus">+</span><span class="add-card-label">Add Recipe</span>`;
    addCard.onclick=()=>setState({showEditor:true,editingRecipe:null});
    grid.appendChild(addCard);
  }
  wrap.appendChild(grid);
  return wrap;
}
function filterGroup(label,options,active,onChange,colors={}) {
  const g=el("div","filter-group");
  const lbl=el("span","filter-label"); lbl.textContent=label;
  const pills=el("div","pills");
  options.forEach(o=>{
    const p=btn(o,"pill"+(active===o?" active":""),()=>onChange(o));
    if(active===o&&o!=="All"&&colors[o]){p.style.background=colors[o];p.style.borderColor=colors[o];p.style.color="#fff";}
    pills.appendChild(p);
  });
  g.append(lbl,pills); return g;
}
function buildCard(recipe) {
  const card=el("div","card");
  const imgWrap=el("div","card-img-wrap");
  if(recipe.image){const img=document.createElement("img");img.src=recipe.image;img.alt=recipe.name;img.onerror=()=>img.replaceWith(fallback(44));imgWrap.appendChild(img);}
  else imgWrap.appendChild(fallback(44));
  const overlay=el("div","card-overlay");imgWrap.appendChild(overlay);
  if(recipe.cuisine){const badge=el("span","cuisine-badge");badge.textContent=recipe.cuisine;badge.style.background=CUISINE_COLORS[recipe.cuisine]||"#666";imgWrap.appendChild(badge);}
  imgWrap.onclick=()=>setState({view:"detail",selected:recipe});
  card.appendChild(imgWrap);
  const body=el("div","card-body");
  const title=el("h3","card-title");title.textContent=recipe.name;title.onclick=()=>setState({view:"detail",selected:recipe});
  const meta=el("div","card-meta");
  (recipe.tags||[]).forEach(t=>{const s=el("span","tag");s.textContent=t;s.style.background=TAG_COLORS[t]||"#555";meta.appendChild(s);});
  const footer=el("div","card-footer");
  const days=el("div","day-pills");
  (recipe.schedule||[]).forEach(d=>{const s=el("span","day-pill");s.textContent=d.slice(0,3);days.appendChild(s);});
  footer.appendChild(days);
  if(state.isAdmin){
    const ab=el("div","card-admin-btns");
    ab.appendChild(btn("✎","icon-btn",e=>{e.stopPropagation();setState({showEditor:true,editingRecipe:recipe});}));
    ab.appendChild(btn("✕","icon-btn del",e=>{e.stopPropagation();confirmDelete(recipe.id);}));
    footer.appendChild(ab);
  }
  body.append(title,meta,footer);card.appendChild(body);return card;
}

// ── DETAIL ─────────────────────────────────────────────────
function buildDetail(recipe) {
  const wrap=el("div","detail fade-in");
  const topbar=el("div","detail-topbar");
  topbar.appendChild(btn("← Back","back-btn",()=>setState({view:"gallery",selected:null})));
  if(state.isAdmin){
    const ab=el("div","detail-admin-btns");
    ab.appendChild(btn("✎ Edit","edit-btn",()=>setState({showEditor:true,editingRecipe:recipe})));
    ab.appendChild(btn("✕ Delete","edit-btn del",()=>confirmDelete(recipe.id)));
    topbar.appendChild(ab);
  }
  wrap.appendChild(topbar);
  const hero=el("div","hero");
  if(recipe.image){const img=document.createElement("img");img.src=recipe.image;img.alt=recipe.name;img.onerror=()=>img.remove();hero.appendChild(img);}
  else{const f=el("div","hero-fallback");f.textContent="🍽️";hero.appendChild(f);}
  hero.appendChild(el("div","hero-overlay"));
  const hc=el("div","hero-content");
  if(recipe.cuisine){const b=el("span","hero-badge");b.textContent=recipe.cuisine;b.style.background=CUISINE_COLORS[recipe.cuisine]||"#666";hc.appendChild(b);}
  const dt=el("h1","detail-title");dt.textContent=recipe.name;hc.appendChild(dt);
  const ht=el("div","hero-tags");
  (recipe.tags||[]).forEach(t=>{const s=el("span","tag");s.textContent=t;s.style.background=TAG_COLORS[t]||"#555";ht.appendChild(s);});
  (recipe.schedule||[]).forEach(d=>{const s=el("span","day-pill");s.textContent=d;ht.appendChild(s);});
  hc.appendChild(ht);hero.appendChild(hc);wrap.appendChild(hero);
  if(recipe.macros){
    const mr=el("div","macros-row");
    Object.entries(recipe.macros).forEach(([k,v])=>{
      const box=el("div","macro-box");
      const val=el("span","macro-val");val.textContent=v+(k!=="calories"?"g":"");
      const key=el("span","macro-key");key.textContent=k.charAt(0).toUpperCase()+k.slice(1);
      box.append(val,key);mr.appendChild(box);
    });
    wrap.appendChild(mr);
  }
  const body=el("div","detail-body");
  const ingCol=el("div");
  const ingTitle=el("h2","section-title");ingTitle.textContent="Ingredients";ingCol.appendChild(ingTitle);
  Object.entries(recipe.ingredients||{}).forEach(([sec,items])=>{
    const s=el("p","ing-section");s.textContent=sec;ingCol.appendChild(s);
    const list=el("ul","ing-list");
    items.forEach(item=>{const li=el("li");li.innerHTML=`<span class="ing-dot">✦</span>${item}`;list.appendChild(li);});
    ingCol.appendChild(list);
  });
  const stepsCol=el("div");
  const stepsTitle=el("h2","section-title");stepsTitle.textContent="Method";stepsCol.appendChild(stepsTitle);
  const sl=el("ol","step-list");
  (recipe.steps||[]).forEach((step,i)=>{
    const li=el("li");
    li.innerHTML=`<span class="step-num">${String(i+1).padStart(2,"0")}</span><span class="step-text">${step}</span>`;
    sl.appendChild(li);
  });
  stepsCol.appendChild(sl);
  body.append(ingCol,stepsCol);wrap.appendChild(body);return wrap;
}

// ── PLANNER ────────────────────────────────────────────────
function buildPlanner() {
  const wrap=el("div","fade-in");
  const title=el("p","planner-title");title.textContent="This Week";wrap.appendChild(title);
  const grid=el("div","planner-grid");
  DAYS.forEach(day=>{
    const col=el("div","day-col");
    const dh=el("div","day-header");
    const dn=el("span","day-name");dn.textContent=day;
    const dayRecipes=state.recipes.filter(r=>(r.schedule||[]).includes(day));
    const dc=el("span","day-count");dc.textContent=dayRecipes.length>0?`${dayRecipes.length} meal${dayRecipes.length>1?"s":""}` :"—";
    dh.append(dn,dc);col.appendChild(dh);
    if(!dayRecipes.length){const e=el("p","empty-day");e.textContent="No meals planned";col.appendChild(e);}
    else dayRecipes.forEach(r=>col.appendChild(buildPlannerCard(r)));
    grid.appendChild(col);
  });
  wrap.appendChild(grid);return wrap;
}
function buildPlannerCard(recipe) {
  const card=el("div","planner-card");
  const iw=el("div","planner-img-wrap");
  if(recipe.image){const img=document.createElement("img");img.src=recipe.image;img.alt=recipe.name;img.onerror=()=>img.remove();iw.appendChild(img);}
  iw.appendChild(el("div","planner-img-overlay"));
  iw.onclick=()=>setState({view:"detail",selected:recipe});
  card.appendChild(iw);
  const pb=el("div","planner-body");
  const pn=el("p","planner-name");pn.textContent=recipe.name;pn.onclick=()=>setState({view:"detail",selected:recipe});
  pb.appendChild(pn);
  const row=el("div");row.style.cssText="display:flex;justify-content:space-between;align-items:center;";
  if(recipe.cuisine){const b=el("span","planner-badge");b.textContent=recipe.cuisine;b.style.background=CUISINE_COLORS[recipe.cuisine]||"#666";row.appendChild(b);}
  if(state.isAdmin){const eb=btn("✎","icon-btn",e=>{e.stopPropagation();setState({showEditor:true,editingRecipe:recipe});});row.appendChild(eb);}
  pb.appendChild(row);card.appendChild(pb);return card;
}

// ── PIN MODAL ──────────────────────────────────────────────
function buildPinModal() {
  const overlay=el("div","modal-overlay");
  const modal=el("div","modal modal-sm scale-in");
  const title=el("h2","modal-title");title.textContent="Admin Access";
  const sub=el("p","modal-sub");sub.textContent="Enter your PIN to continue";
  const pinInput=document.createElement("input");
  pinInput.type="password";pinInput.maxLength=4;pinInput.placeholder="••••";pinInput.className="pin-input";
  const errMsg=el("p","pin-error");errMsg.style.display="none";errMsg.textContent="Incorrect PIN";
  const btns=el("div","modal-btns");
  btns.appendChild(btn("Cancel","btn-cancel",()=>setState({showPin:false})));
  const confirmB=btn("Enter","btn-confirm",()=>{
    if(pinInput.value===ADMIN_PIN){setState({isAdmin:true,showPin:false});}
    else{pinInput.className="pin-input error";errMsg.style.display="block";pinInput.value="";setTimeout(()=>{pinInput.className="pin-input";errMsg.style.display="none";},1500);}
  });
  pinInput.onkeydown=e=>{if(e.key==="Enter")confirmB.click();};
  btns.appendChild(confirmB);
  modal.append(title,sub,pinInput,errMsg,btns);
  overlay.appendChild(modal);
  setTimeout(()=>pinInput.focus(),80);
  return overlay;
}

// ── EDITOR ─────────────────────────────────────────────────
function buildEditor(recipe) {
  const isNew=!recipe;
  let form=recipe?JSON.parse(JSON.stringify(recipe)):{name:"",cuisine:"",tags:[],type:"Main Course",schedule:[],image:"",ingredients:{"":[""]},steps:[""],macros:null};
  const overlay=el("div","modal-overlay");
  const modal=el("div","modal modal-lg scale-in");
  const header=el("div","editor-header");
  const title=el("h2","modal-title");title.textContent=isNew?"New Recipe":"Edit Recipe";
  header.append(title,btn("✕","close-btn",()=>setState({showEditor:false,editingRecipe:null})));
  modal.appendChild(header);
  const body=el("div","editor-body");

  function rebuild(){
    body.innerHTML="";
    // Basic
    const s1=esec("Basic Info");
    s1.appendChild(flabel("Recipe Name *"));s1.appendChild(tinput(form.name,v=>form.name=v));
    s1.appendChild(flabel("Image URL"));
    const ii=tinput(form.image||"",v=>{form.image=v;rebuild();});ii.placeholder="https://example.com/photo.jpg";s1.appendChild(ii);
    if(form.image){const p=document.createElement("img");p.src=form.image;p.className="img-preview";p.onerror=()=>p.remove();s1.appendChild(p);}
    const tc=el("div","two-col");
    const cw=el("div");cw.appendChild(flabel("Cuisine"));
    const cs=document.createElement("select");cs.innerHTML=`<option value="">Select...</option>`+CUISINE_OPTIONS.map(c=>`<option value="${c}"${form.cuisine===c?" selected":""}>${c}</option>`).join("");
    cs.onchange=e=>form.cuisine=e.target.value;cw.appendChild(cs);tc.appendChild(cw);
    const tw=el("div");tw.appendChild(flabel("Type"));
    const ts=document.createElement("select");ts.innerHTML=TYPE_OPTIONS.map(t=>`<option value="${t}"${form.type===t?" selected":""}>${t}</option>`).join("");
    ts.onchange=e=>form.type=e.target.value;tw.appendChild(ts);tc.appendChild(tw);
    s1.appendChild(tc);body.appendChild(s1);
    // Tags
    const s2=esec("Tags");
    const cg=el("div","check-grid");
    TAG_OPTIONS.forEach(t=>{
      const lbl=el("label","check-label");const cb=document.createElement("input");cb.type="checkbox";cb.checked=(form.tags||[]).includes(t);
      cb.onchange=()=>form.tags=(form.tags||[]).includes(t)?form.tags.filter(x=>x!==t):[...(form.tags||[]),t];
      lbl.append(cb,document.createTextNode(t));cg.appendChild(lbl);
    });
    s2.appendChild(cg);body.appendChild(s2);
    // Schedule
    const s3=esec("Schedule");
    const dg=el("div","check-grid");
    DAYS.forEach(d=>{
      const lbl=el("label","check-label");const cb=document.createElement("input");cb.type="checkbox";cb.checked=(form.schedule||[]).includes(d);
      cb.onchange=()=>form.schedule=(form.schedule||[]).includes(d)?form.schedule.filter(x=>x!==d):[...(form.schedule||[]),d];
      lbl.append(cb,document.createTextNode(d));dg.appendChild(lbl);
    });
    s3.appendChild(dg);body.appendChild(s3);
    // Ingredients
    const s4=esec("Ingredients");
    Object.entries(form.ingredients||{}).forEach(([sec,items])=>{
      const block=el("div","ing-block");
      const bh=el("div","ing-block-header");
      const si=tinput(sec,v=>{const entries=Object.entries(form.ingredients);const idx=entries.findIndex(([k])=>k===sec);entries[idx][0]=v;form.ingredients=Object.fromEntries(entries);});
      si.placeholder="Section name";si.style.fontStyle="italic";si.style.marginBottom="0";
      bh.append(si,btn("✕","icon-btn del",()=>{delete form.ingredients[sec];rebuild();}));
      block.appendChild(bh);
      items.forEach((item,i)=>{
        const row=el("div","ing-row");
        const inp=tinput(item,v=>form.ingredients[sec][i]=v);inp.placeholder="e.g. 2 tbsp olive oil";inp.style.marginBottom="0";
        row.append(inp,btn("✕","icon-btn del",()=>{form.ingredients[sec]=form.ingredients[sec].filter((_,idx)=>idx!==i);rebuild();}));
        block.appendChild(row);
      });
      block.appendChild(btn("+ Add ingredient","ghost-btn",()=>{form.ingredients[sec]=[...form.ingredients[sec],""];rebuild();}));
      s4.appendChild(block);
    });
    s4.appendChild(btn("+ Add section","ghost-btn",()=>{form.ingredients={...form.ingredients,"New Section":[""]};rebuild();}));
    body.appendChild(s4);
    // Steps
    const s5=esec("Method");
    (form.steps||[]).forEach((step,i)=>{
      const row=el("div","step-row");
      const num=el("span","step-row-num");num.textContent=String(i+1).padStart(2,"0");
      const ta=document.createElement("textarea");ta.value=step;ta.placeholder=`Step ${i+1}`;ta.oninput=e=>form.steps[i]=e.target.value;
      row.append(num,ta,btn("✕","icon-btn del",()=>{form.steps=form.steps.filter((_,idx)=>idx!==i);rebuild();}));
      s5.appendChild(row);
    });
    s5.appendChild(btn("+ Add step","ghost-btn",()=>{form.steps=[...(form.steps||[]),""];rebuild();}));
    body.appendChild(s5);
  }
  rebuild();
  modal.appendChild(body);
  const footer=el("div","editor-footer");
  footer.appendChild(btn("Cancel","btn-cancel",()=>setState({showEditor:false,editingRecipe:null})));
  footer.appendChild(btn(isNew?"Add Recipe":"Save Changes","btn-confirm",async()=>{
    if(!form.name.trim()){alert("Recipe name is required");return;}
    if(!form.id) form.id=Date.now().toString();
    const ok = form.id&&!isNew ? await sbUpdate(form) : await sbInsert(form);
    if(ok){
      const recipes = await sbFetch();
      setState({recipes:recipes||[],showEditor:false,editingRecipe:null});
    } else alert("Failed to save. Check your connection.");
  }));
  modal.appendChild(footer);
  overlay.appendChild(modal);return overlay;
}

// ── DELETE ─────────────────────────────────────────────────
async function confirmDelete(id) {
  if(confirm("Delete this recipe?")){
    await sbDelete(id);
    const recipes=await sbFetch();
    setState({recipes:recipes||[],view:"gallery",selected:null});
  }
}

// ── HELPERS ────────────────────────────────────────────────
function el(tag,cls=""){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function btn(text,cls,onClick){const b=el("button",cls);b.textContent=text;if(onClick)b.onclick=onClick;return b;}
function fallback(size){const d=el("div","card-img-fallback");d.textContent="🍽️";d.style.fontSize=size+"px";return d;}
function esec(title){const s=el("div","editor-section");const t=el("p","editor-section-title");t.textContent=title;s.appendChild(t);return s;}
function flabel(text){const l=el("label","field-label");l.textContent=text;return l;}
function tinput(val,onChange){const i=document.createElement("input");i.type="text";i.value=val;i.oninput=e=>onChange(e.target.value);return i;}

init();
</script>
</body>
</html>
