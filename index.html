<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#080808"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Mehdi's Kitchen"/>
<title>Mehdi's Kitchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080808;
  --bg2:#0f0f0f;
  --bg3:#161616;
  --bg4:#1e1e1e;
  --border:#1e1e1e;
  --border2:#2a2a2a;
  --text:#f0ede8;
  --text2:#7a7a7a;
  --text3:#3a3a3a;
  --gold:#c8a96e;
  --gold2:rgba(200,169,110,0.1);
  --gold-border:rgba(200,169,110,0.18);
  --red:#e05555;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
button{cursor:pointer;font-family:var(--sans);border:none;background:none;color:inherit;}
input,textarea,select{font-family:var(--sans);color:var(--text);background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;font-size:14px;width:100%;outline:none;transition:border-color .2s;}
input:focus,textarea:focus,select:focus{border-color:var(--gold);}
select option{background:var(--bg2);}
img{display:block;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── SHELL ── */
#app{display:flex;flex-direction:column;min-height:100vh;}
main{flex:1;padding-bottom:calc(82px + var(--safe-bot));}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(8,8,8,0.9);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  padding-top:var(--safe-top);
}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;}

/* ── LOGO ── */
.logo{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;}
.logo-mark{color:var(--gold);font-size:13px;line-height:1;}
.logo-text{font-family:var(--serif);font-size:20px;font-weight:400;letter-spacing:0.04em;color:var(--text);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.admin-btn{
  font-size:12px;font-weight:500;letter-spacing:0.06em;
  padding:6px 14px;border-radius:100px;
  border:1px solid var(--border2);color:var(--text2);
  transition:all .2s;
}
.admin-btn.on{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}
.admin-btn:active{opacity:.75;}

/* Refresh button */
.refresh-btn{
  width:34px;height:34px;border-radius:50%;
  border:1px solid var(--border2);color:var(--text2);
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
.refresh-btn:active{opacity:.6;transform:rotate(180deg);}
.refresh-btn.spinning svg{animation:rot .7s linear infinite;}

/* Search bar */
.search-wrap{padding:0 16px 12px;}
.search-inner{
  display:flex;align-items:center;gap:10px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:12px;padding:10px 16px;
  transition:border-color .2s;
}
.search-inner:focus-within{border-color:var(--gold-border);}
.search-inner input{background:none;border:none;padding:0;font-size:14px;color:var(--text);flex:1;}
.search-inner input::placeholder{color:var(--text3);}
.search-lbl{font-size:13px;color:var(--text3);flex-shrink:0;font-family:var(--serif);letter-spacing:0.05em;}

/* Filter chips */
.chips{display:flex;gap:7px;overflow-x:auto;padding:0 16px 14px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;padding:6px 14px;border-radius:100px;
  font-size:12px;font-weight:400;letter-spacing:0.04em;
  border:1px solid var(--border2);color:var(--text2);
  background:transparent;transition:all .15s;white-space:nowrap;
  font-family:var(--serif);font-size:13px;
}
.chip.on{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}
.chip:active{opacity:.7;}

/* ── BOTTOM NAV ── */
.bnav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(8,8,8,0.94);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;
  padding:8px 20px calc(8px + var(--safe-bot));
}
.bnav-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:6px 24px;color:var(--text3);font-size:10px;
  font-weight:500;letter-spacing:0.06em;text-transform:uppercase;
  transition:color .2s;
}
.bnav-item.on{color:var(--gold);}
.bnav-item:active{opacity:.6;}
.bnav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
.bnav-add{
  width:48px;height:48px;border-radius:14px;
  background:linear-gradient(145deg,#c8a96e 0%,#9a7340 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(200,169,110,0.3);
  transition:transform .15s,box-shadow .15s;flex-shrink:0;
}
.bnav-add:active{transform:scale(.93);box-shadow:0 2px 8px rgba(200,169,110,0.15);}
.plus-svg{width:22px;height:22px;stroke:#0a0a0a;stroke-width:2.5;fill:none;}

/* ── HOME PAGE ── */
.home-wrap{padding:20px 0 0;}
.sec-hdr{display:flex;align-items:baseline;justify-content:space-between;padding:0 20px;margin-bottom:14px;}
.sec-title{font-family:var(--serif);font-size:24px;font-weight:400;letter-spacing:0.02em;}
.sec-title span{font-size:13px;color:var(--text2);font-family:var(--sans);font-weight:400;margin-left:6px;letter-spacing:0;}
.sec-link{font-size:12px;color:var(--gold);font-weight:500;letter-spacing:0.06em;text-transform:uppercase;}

.week-row{display:flex;gap:10px;overflow-x:auto;padding:0 20px 4px;scrollbar-width:none;}
.week-row::-webkit-scrollbar{display:none;}
.day-tile{
  flex-shrink:0;width:120px;border-radius:14px;
  border:1px solid var(--border);background:var(--bg2);
  overflow:hidden;cursor:pointer;transition:border-color .18s,transform .18s;
}
.day-tile:active{transform:scale(.97);}
.day-tile.today{border-color:var(--gold-border);}
.day-tile.has-recipe{border-color:var(--border2);}
.day-tile.today.has-recipe{border-color:var(--gold);}
.day-thumb{width:100%;height:72px;object-fit:cover;background:var(--bg3);}
.day-thumb-empty{width:100%;height:72px;background:var(--bg3);display:flex;align-items:center;justify-content:center;}
.cutlery{width:18px;height:18px;stroke:var(--text3);stroke-width:1.5;fill:none;}
.day-foot{padding:8px 10px 10px;}
.day-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-bottom:3px;}
.day-tile.today .day-label{color:var(--gold);}
.day-rname{font-family:var(--serif);font-size:12px;line-height:1.3;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.day-empty-lbl{font-size:11px;color:var(--text3);font-style:italic;}

.recipes-section{padding:26px 0 0;}
.recipe-col{display:flex;flex-direction:column;gap:12px;padding:0 16px;}

/* ── RECIPE CARD ── */
.rcard{display:flex;border-radius:14px;overflow:hidden;border:1px solid var(--border);background:var(--bg2);cursor:pointer;transition:border-color .18s,transform .18s;}
.rcard:active{transform:scale(.99);border-color:var(--border2);}
.rcard-img{width:100px;flex-shrink:0;background:var(--bg3);overflow:hidden;position:relative;}
.rcard-img img{width:100%;height:100%;object-fit:cover;}
.rcard-img-fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.rcard-body{flex:1;padding:13px 14px;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
.rcard-top{margin-bottom:6px;}
.rcard-cuisine{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;}
.rcard-name{font-family:var(--serif);font-size:16px;font-weight:400;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.rcard-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:7px;}
.rcard-tag{font-size:10px;font-weight:500;padding:3px 9px;border-radius:100px;border:1px solid var(--border2);color:var(--text2);letter-spacing:0.03em;}
.rcard-tag.gold{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}
.rcard-type{font-size:11px;color:var(--text3);font-style:italic;font-family:var(--serif);}
.rcard-day{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);}

/* ── RECIPES GRID PAGE ── */
.grid-wrap{padding:16px;}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.gcard{border-radius:14px;overflow:hidden;border:1px solid var(--border);background:var(--bg2);cursor:pointer;transition:transform .18s,border-color .18s;}
.gcard:active{transform:scale(.98);}
.gcard-img{position:relative;height:130px;overflow:hidden;background:var(--bg3);}
.gcard-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.gcard:active .gcard-img img{transform:scale(1.04);}
.gcard-img-fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.gcard-bar{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.65));padding:18px 10px 7px;display:flex;align-items:center;gap:5px;}
.cuisine-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.cuisine-lbl{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;}
.gcard-body{padding:10px 11px 12px;}
.gcard-name{font-family:var(--serif);font-size:15px;font-weight:400;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:7px;}
.gcard-tags{display:flex;flex-wrap:wrap;gap:4px;}
.gtag{font-size:10px;padding:2px 8px;border-radius:100px;border:1px solid var(--border2);color:var(--text2);}
.gtag.gold{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}

/* ── DETAIL PAGE ── */
.detail-hero{position:relative;height:280px;overflow:hidden;background:var(--bg3);}
.detail-hero img{width:100%;height:100%;object-fit:cover;}
.detail-hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,8,8,0.35) 0%,transparent 45%,rgba(8,8,8,0.92) 100%);}
.detail-back{position:absolute;top:calc(14px + var(--safe-top));left:18px;width:36px;height:36px;border-radius:50%;background:rgba(8,8,8,0.55);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;color:var(--text);}
.back-svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;}
.detail-admin-row{position:absolute;top:calc(14px + var(--safe-top));right:18px;display:flex;gap:8px;}
.d-btn{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:500;backdrop-filter:blur(12px);letter-spacing:0.04em;}
.d-btn.edit{background:rgba(8,8,8,0.55);color:var(--text);}
.d-btn.del{background:rgba(224,85,85,0.18);color:var(--red);}
.detail-body{padding:0 20px 32px;}
.detail-top{padding:18px 0 16px;}
.detail-meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.d-cuisine{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;border:1px solid var(--border2);background:var(--bg3);font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;}
.d-type{padding:4px 12px;border-radius:100px;border:1px solid var(--border2);background:var(--bg3);font-size:12px;color:var(--text2);font-style:italic;font-family:var(--serif);}
.detail-title{font-family:var(--serif);font-size:30px;font-weight:400;line-height:1.15;letter-spacing:0.01em;margin-bottom:12px;}
.detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.d-tag{padding:4px 12px;border-radius:100px;font-size:11px;font-weight:500;border:1px solid var(--gold-border);color:var(--gold);background:var(--gold2);}
.macros-row{display:grid;grid-template-columns:repeat(4,1fr);background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:22px;}
.mac{padding:12px 6px;text-align:center;border-right:1px solid var(--border);}
.mac:last-child{border-right:none;}
.mac-v{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--gold);display:block;}
.mac-l{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:0.1em;margin-top:2px;}
.sched-row{margin-bottom:22px;}
.sched-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2);margin-bottom:8px;}
.sched-days{display:flex;gap:6px;flex-wrap:wrap;}
.sched-pill{font-size:11px;font-weight:500;padding:6px 13px;border-radius:100px;border:1px solid var(--border2);color:var(--text2);background:var(--bg3);letter-spacing:0.06em;transition:all .18s;cursor:pointer;}
.sched-pill.on{background:var(--gold2);border-color:var(--gold-border);color:var(--gold);}
.sched-pill.saving{opacity:0.5;pointer-events:none;}
.d-sec{margin-bottom:26px;}
.d-sec-title{font-family:var(--serif);font-size:18px;font-weight:400;color:var(--text);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px;letter-spacing:0.02em;}
.d-sub{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin:14px 0 8px;}
.ing-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px;line-height:1.5;}
.ing-row:last-child{border:none;}
.ing-bullet{width:4px;height:4px;border-radius:50%;background:var(--gold);margin-top:8px;flex-shrink:0;opacity:0.7;}
.step-r{display:flex;gap:16px;margin-bottom:18px;align-items:flex-start;}
.step-n{font-family:var(--serif);font-size:28px;font-weight:300;color:var(--gold);opacity:0.5;line-height:1;min-width:28px;margin-top:-2px;}
.step-t{font-size:14px;line-height:1.65;color:var(--text);padding-top:3px;}

/* ── PLANNER ── */
.planner-wrap{padding:20px 16px;}
.pl-day{margin-bottom:18px;}
.pl-day-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:11px;margin-bottom:8px;}
.pl-day-name{font-size:13px;font-weight:500;color:var(--text2);letter-spacing:0.04em;}
.pl-day-name.today{color:var(--gold);}
.today-badge{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold-border);background:var(--gold2);padding:2px 8px;border-radius:100px;}
.pl-recipe{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;cursor:pointer;transition:border-color .15s;}
.pl-recipe:active{border-color:var(--gold-border);}
.pl-thumb{width:46px;height:46px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--bg3);}
.pl-name{font-family:var(--serif);font-size:15px;flex:1;}
.pl-cuis{font-size:11px;margin-top:1px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;}
.pl-none{font-size:13px;color:var(--text3);padding:4px 2px;font-style:italic;font-family:var(--serif);}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.72);backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:var(--bg2);border:1px solid var(--border2);border-radius:22px 22px 0 0;width:100%;max-width:520px;}
.sheet-handle{width:36px;height:3px;background:var(--border2);border-radius:2px;margin:14px auto 0;}

/* PIN */
.pin-sheet{padding:28px 24px calc(28px + var(--safe-bot));}
.pin-title{font-family:var(--serif);font-size:22px;font-weight:400;margin-bottom:6px;letter-spacing:0.02em;}
.pin-sub{font-size:13px;color:var(--text2);margin-bottom:22px;}
.pin-input{font-size:26px;letter-spacing:10px;text-align:center;padding:15px;border-radius:12px;width:100%;border:1.5px solid var(--border2);background:var(--bg3);color:var(--text);font-family:var(--sans);font-weight:600;margin-bottom:6px;}
.pin-input.err{border-color:var(--red);}
.pin-err{font-size:12px;color:var(--red);text-align:center;min-height:18px;margin-bottom:14px;}
.sheet-btns{display:flex;gap:10px;}
.sbtn-cancel{flex:1;padding:14px;border-radius:11px;border:1px solid var(--border2);color:var(--text2);font-size:14px;}
.sbtn-ok{flex:2;padding:14px;border-radius:11px;background:var(--gold);color:#080808;font-size:14px;font-weight:600;}
.sbtn-ok:active{opacity:.85;}

/* EDITOR */
.editor-sheet{max-height:92vh;display:flex;flex-direction:column;}
.editor-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.editor-title-text{font-family:var(--serif);font-size:20px;font-weight:400;letter-spacing:0.02em;}
.close-x{width:30px;height:30px;border-radius:50%;background:var(--bg3);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:17px;}
.editor-body{flex:1;overflow-y:auto;padding:18px 20px;}
.esec{margin-bottom:22px;}
.esec-title{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.flbl{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;margin-top:10px;}
.flbl:first-child{margin-top:0;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tgrid{display:flex;flex-wrap:wrap;gap:6px;}
.ttog{padding:5px 13px;border-radius:100px;font-size:12px;border:1px solid var(--border2);color:var(--text2);transition:all .12s;}
.ttog.on{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}
.dtog{padding:5px 11px;border-radius:100px;font-size:12px;border:1px solid var(--border2);color:var(--text2);transition:all .12s;letter-spacing:0.03em;}
.dtog.on{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}
.img-prev{width:100%;height:130px;object-fit:cover;border-radius:10px;margin-top:8px;}
.ing-block{background:var(--bg3);border-radius:11px;padding:12px;margin-bottom:9px;}
.ing-sec-inp{background:none;border:none;border-bottom:1px solid var(--border2);border-radius:0;padding:0 0 5px;color:var(--gold);font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;width:100%;outline:none;margin-bottom:8px;}
.ing-line{display:flex;gap:7px;margin-bottom:6px;align-items:center;}
.ing-line input{margin-bottom:0;flex:1;}
.step-edit{display:flex;gap:9px;margin-bottom:7px;align-items:flex-start;}
.step-no{width:26px;height:26px;border-radius:50%;background:var(--gold2);color:var(--gold);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:7px;}
.step-edit textarea{flex:1;resize:vertical;min-height:58px;}
.del-x{width:26px;height:26px;border-radius:50%;flex-shrink:0;background:rgba(224,85,85,0.08);color:var(--red);font-size:15px;display:flex;align-items:center;justify-content:center;}
.ghost{font-size:13px;color:var(--gold);padding:7px 0;letter-spacing:0.03em;}
.ghost::before{content:"+ ";}
.macros-g{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.editor-footer{padding:14px 20px calc(14px + var(--safe-bot));border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;}

/* ── AI IMPORT MODAL ── */
.ai-import-sheet{max-height:85vh;display:flex;flex-direction:column;}
.ai-import-body{flex:1;overflow-y:auto;padding:20px;}
.ai-drop-zone{
  border:1.5px dashed var(--border2);border-radius:14px;
  padding:36px 20px;text-align:center;
  transition:border-color .2s,background .2s;
  cursor:pointer;position:relative;
}
.ai-drop-zone.has-image{border-color:var(--gold-border);background:var(--gold2);}
.ai-drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.ai-drop-icon{font-size:28px;margin-bottom:8px;}
.ai-drop-title{font-family:var(--serif);font-size:18px;font-weight:400;color:var(--text);margin-bottom:5px;}
.ai-drop-sub{font-size:13px;color:var(--text2);}
.ai-preview-img{width:100%;max-height:200px;object-fit:contain;border-radius:10px;margin-top:12px;}
.ai-status{
  margin-top:16px;padding:12px 16px;border-radius:10px;
  background:var(--bg3);border:1px solid var(--border2);
  font-size:13px;color:var(--text2);text-align:center;
  display:none;
}
.ai-status.visible{display:block;}
.ai-status.error{border-color:rgba(224,85,85,0.3);color:var(--red);background:rgba(224,85,85,0.05);}
.ai-status.success{border-color:var(--gold-border);color:var(--gold);background:var(--gold2);}
.ai-import-footer{padding:14px 20px calc(14px + var(--safe-bot));border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;}

/* ── DEV VIEW ── */
.dev-view-overlay{
  position:fixed;inset:0;z-index:200;
  background:#050508;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.dev-view-hdr{
  flex-shrink:0;
  background:rgba(5,5,8,0.96);backdrop-filter:blur(20px);
  border-bottom:1px solid #1a1a2e;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:calc(56px + var(--safe-top));padding-top:var(--safe-top);
  z-index:10;
}
.dev-view-title{font-family:var(--serif);font-size:18px;font-weight:400;letter-spacing:0.04em;color:#e8e4ff;}
.dev-view-subtitle{font-size:11px;color:#444466;letter-spacing:0.06em;text-transform:uppercase;margin-top:2px;}
.dev-graph-wrap{
  flex:1;overflow:auto;
  position:relative;
  scrollbar-width:thin;scrollbar-color:#1a1a2e transparent;
}
.dev-graph-wrap::-webkit-scrollbar{width:4px;height:4px;}
.dev-graph-wrap::-webkit-scrollbar-thumb{background:#1a1a2e;border-radius:2px;}
/* Canvas behind nodes */
.dev-canvas{
  position:absolute;top:0;left:0;
  pointer-events:none;z-index:0;
}
/* Graph container — horizontal scroll */
.dev-graph{
  display:flex;gap:0;
  padding:30px 24px 80px;
  min-width:max-content;
  position:relative;
  min-height:100%;
}
/* Column */
.dev-col{
  display:flex;flex-direction:column;gap:10px;
  width:160px;flex-shrink:0;
  position:relative;z-index:1;
}
.dev-col-gap{width:80px;flex-shrink:0;}
.dev-col-hdr{
  font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;
  color:#444466;margin-bottom:4px;padding:0 2px;
}
/* Node */
.dev-node{
  border-radius:8px;padding:10px 12px;
  cursor:pointer;
  transition:transform .15s, box-shadow .15s, border-color .15s;
  position:relative;
  user-select:none;
}
.dev-node:active{transform:scale(.97);}
.dev-node.selected{box-shadow:0 0 0 1.5px currentColor;}
/* Node colour themes */
.dev-node.green{background:#0a1a0f;border:1px solid #1a3a22;color:#4caf72;}
.dev-node.green.selected{box-shadow:0 0 0 1.5px #4caf72, 0 0 18px rgba(76,175,114,0.25);}
.dev-node.gold{background:#1a1200;border:1px solid #3a2a00;color:#c8a96e;}
.dev-node.gold.selected{box-shadow:0 0 0 1.5px #c8a96e, 0 0 18px rgba(200,169,110,0.25);}
.dev-node.blue{background:#080f1a;border:1px solid #0f2040;color:#6490dc;}
.dev-node.blue.selected{box-shadow:0 0 0 1.5px #6490dc, 0 0 18px rgba(100,144,220,0.25);}
.dev-node.purple{background:#110a1a;border:1px solid #2a1040;color:#a06ee0;}
.dev-node.purple.selected{box-shadow:0 0 0 1.5px #a06ee0, 0 0 18px rgba(160,110,224,0.25);}
.dev-node.red{background:#1a0808;border:1px solid #3a1010;color:#e05555;}
.dev-node.red.selected{box-shadow:0 0 0 1.5px #e05555, 0 0 18px rgba(224,85,85,0.25);}
.dev-node.dim{background:#0a0a0a;border:1px solid #1a1a1a;color:#444466;}
.dev-node-label{
  font-size:11px;font-weight:600;letter-spacing:0.04em;
  color:inherit;margin-bottom:2px;
}
.dev-node-sub{
  font-size:9px;color:#444466;letter-spacing:0.03em;
  font-family:monospace;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.dev-node-dot{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:6px;height:6px;border-radius:50%;background:currentColor;opacity:0.6;
}
.dev-node-dot-left{
  position:absolute;left:-3px;top:50%;transform:translateY(-50%);
  width:6px;height:6px;border-radius:50%;background:currentColor;opacity:0.6;
}
/* Detail panel at bottom */
.dev-detail-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  background:#0a0a12;border-top:1px solid #1a1a2e;
  padding:16px 20px calc(16px + var(--safe-bot));
  transform:translateY(100%);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.dev-detail-panel.open{transform:translateY(0);}
.dev-detail-name{
  font-family:var(--serif);font-size:18px;font-weight:400;
  color:#e8e4ff;margin-bottom:3px;
}
.dev-detail-file{font-size:11px;color:#444466;font-family:monospace;margin-bottom:8px;}
.dev-detail-desc{font-size:13px;color:#888;line-height:1.6;margin-bottom:12px;}
.dev-detail-actions{display:flex;gap:8px;flex-wrap:wrap;}
.dev-action-btn{
  padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;
  letter-spacing:0.04em;border:1px solid;
  transition:opacity .15s;
}
.dev-action-btn:active{opacity:.7;}

/* ── EMPTY & LOADING ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 30px;text-align:center;}
.empty-title{font-family:var(--serif);font-size:20px;font-weight:300;color:var(--text2);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--text3);}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:14px;}
.spin{width:28px;height:28px;border:1.5px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:rot .7s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}
.load-txt{font-size:13px;color:var(--text3);letter-spacing:0.05em;font-family:var(--serif);}

/* ── TOAST ── */
.toast{
  position:fixed;z-index:400;
  bottom:calc(90px + var(--safe-bot));
  left:50%;transform:translateX(-50%);
  background:var(--gold);color:#080808;
  padding:11px 22px;border-radius:100px;
  font-size:13px;font-weight:600;letter-spacing:0.03em;
  white-space:nowrap;box-shadow:0 6px 28px rgba(0,0,0,0.45);
  animation:tin .28s ease forwards;
}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

}

// ── SUPABASE ───────────────────────────────────────────────
async function sbFetch(){
  try{
    const r=await fetch(SB_URL+"/rest/v1/recipes?select=*&order=created_at.asc",{headers:{...sbH,"Accept":"application/json"}});
    return r.ok?await r.json():null;
  }catch{return null;}
}
async function sbInsert(recipe){
  try{
    const r=await fetch(SB_URL+"/rest/v1/recipes",{method:"POST",headers:{...sbH,"Prefer":"resolution=merge-duplicates"},body:JSON.stringify(recipe)});
    return r.ok;
  }catch{return false;}
}
async function sbUpdate(recipe){
  try{
    const body=Object.assign({},recipe);
    delete body.id;
    delete body.created_at;
    const r=await fetch(SB_URL+"/rest/v1/recipes?id=eq."+encodeURIComponent(recipe.id),{method:"PATCH",headers:{...sbH,"Prefer":"return=minimal"},body:JSON.stringify(body)});
    return r.ok;
  }catch{return false;}
}
async function sbDelete(id){
  try{
    const r=await fetch(SB_URL+"/rest/v1/recipes?id=eq."+encodeURIComponent(id),{method:"DELETE",headers:{...sbH,"Prefer":"return=minimal"}});
    return r.ok;
  }catch{return false;}
}
async function sbSeed(){

// ── DAY HELPERS ────────────────────────────────────────────
function todayIdx(){var d=new Date().getDay();return d===0?6:d-1;}
function orderedDays(){var idx=todayIdx();return DAYS.slice(idx).concat(DAYS.slice(0,idx));}
function todayName(){return DAYS[todayIdx()];}

// ── URL IMPORT ─────────────────────────────────────────────
async function checkUrlImport(recipes){
  try{
    var p=new URLSearchParams(window.location.search);
    var enc=p.get("recipe");
    if(!enc)return recipes;
    var recipe=JSON.parse(atob(decodeURIComponent(enc)));
    if(!recipe||!recipe.name)return recipes;
    var exists=recipes.find(function(r){return r.id===recipe.id;});
    if(!exists){
      await sbInsert(recipe);
      var fresh=await sbFetch();
      if(fresh)recipes=fresh;
      showToast("✦ "+recipe.name+" added");
    }
    window.history.replaceState({},"",window.location.pathname);
    return recipes;
  }catch(e){return recipes;}
}

// ── REFRESH ────────────────────────────────────────────────
async function doRefresh(btnEl){
  if(btnEl){btnEl.classList.add("spinning");}
  var fresh=await sbFetch();
  if(fresh){ss({recipes:fresh});}
  showToast("✦ Refreshed");
  if(btnEl){setTimeout(function(){btnEl.classList.remove("spinning");},600);}

function render(){
  var app=document.getElementById("app");
  app.innerHTML="";
  if(S.view!=="detail")app.appendChild(buildHeader());
  var main=el("main");
  if(S.loading){
    var d=el("div","loading");
    var sp=el("div","spin");
    var tx=el("p","load-txt");tx.textContent="Loading your kitchen...";

    main.appendChild(buildHome());

    main.appendChild(buildRecipesPage());

    main.appendChild(buildDetail(S.selected));
  } else if(S.view==="planner"){
    main.appendChild(buildPlanner());

  if(S.showDevView)app.appendChild(buildDevView());
}

// ── RECIPE CARD ────────────────────────────────────────────
function buildRcard(recipe){
  var card=el("div","rcard");
  var imgWrap=el("div","rcard-img");
  var img=document.createElement("img");
  img.src=recipe.image||"";img.alt=recipe.name;
  img.style.cssText="width:100%;height:100%;object-fit:cover;";
  img.onerror=function(){img.replaceWith(imgFb());};
  imgWrap.appendChild(img);
  var body=el("div","rcard-body");
  var top=el("div","rcard-top");
  if(recipe.cuisine){
    var cc=el("p","rcard-cuisine");
    cc.style.color=CUISINE_COLORS[recipe.cuisine]||"#888";
    cc.textContent=recipe.cuisine;top.appendChild(cc);
  }
  var name=el("p","rcard-name");name.textContent=recipe.name;top.appendChild(name);
  body.appendChild(top);
  var meta=el("div","rcard-meta");
  (recipe.tags||[]).forEach(function(t){var tg=el("span","rcard-tag gold");tg.textContent=t;meta.appendChild(tg);});
  if(recipe.type){var ty=el("span","rcard-type");ty.textContent=recipe.type;meta.appendChild(ty);}
  if(recipe.schedule&&recipe.schedule.length){
    var dy=el("span","rcard-day");
    dy.textContent=Array.isArray(recipe.schedule)?recipe.schedule.join(", "):(recipe.schedule||"");
    meta.appendChild(dy);
  }
  body.appendChild(meta);
  card.append(imgWrap,body);
  card.onclick=function(){ss({view:"detail",selected:recipe,prevView:"home"});};
  return card;
}

    var mb=el("div","macros-row");
    [{v:recipe.macros.calories,l:"Cal"},{v:recipe.macros.protein+"g",l:"Protein"},{v:recipe.macros.carbs+"g",l:"Carbs"},{v:recipe.macros.fat+"g",l:"Fat"}].forEach(function(m){

      mc.append(mv,ml);mb.appendChild(mc);

    var pill=btn(day.slice(0,3),"sched-pill"+(isOn?" on":""),async function(){
      var wasOn=(recipe.schedule||[]).includes(day);
      var newSched=wasOn?(recipe.schedule||[]).filter(function(d){return d!==day;}):(recipe.schedule||[]).concat([day]);
      recipe.schedule=newSched;
      pill.className="sched-pill saving";
      var updated=Object.assign({},recipe,{schedule:newSched});
      var ok=await sbUpdate(updated);
      if(ok){
        S.recipes=S.recipes.map(function(r){return r.id===recipe.id?Object.assign({},r,{schedule:newSched}):r;});
        S.selected=Object.assign({},recipe,{schedule:newSched});
        pill.className="sched-pill"+(newSched.includes(day)?" on":"");
        showToast(newSched.includes(day)?"✦ Added to "+day:"Removed from "+day);
      } else {
        recipe.schedule=wasOn?newSched.concat([day]):newSched.filter(function(d){return d!==day;});
        pill.className="sched-pill"+(wasOn?" on":"");

  schedWrap.append(schedLbl,schedDays);

  body.appendChild(top);
  // Ingredients

    Object.entries(recipe.ingredients).forEach(function(entry){

    var sec2=el("div","d-sec");
    var st2=el("p","d-sec-title");st2.textContent="Method";sec2.appendChild(st2);

      var row=el("div","step-r");

      var tx2=el("span","step-t");tx2.textContent=step;
      row.append(num,tx2);sec2.appendChild(row);
    });

  }
  page.appendChild(body);
  page.appendChild(buildBnav());
  return page;
}

function buildEditorModal(recipe){
  var isNew=!recipe;

        row.append(inp,dx);block.appendChild(row);

  sheet.append(handle,hdr,body,footer);
  ov.appendChild(sheet);
  ov.onclick=function(e){if(e.target===ov)ss({showEditor:false,editingRecipe:null});};
  return ov;
}

// ── AI IMPORT MODAL ────────────────────────────────────────
function buildAiImportModal(){
  var ov=el("div","overlay");
  var sheet=el("div","sheet ai-import-sheet");
  var handle=el("div","sheet-handle");
  var hdr=el("div","editor-hdr");
  var titleEl=el("h2","editor-title-text");titleEl.textContent="AI Recipe Import";
  var closeB=btn("x","close-x",function(){ss({showAiImport:false});});
  hdr.append(titleEl,closeB);

  var body=el("div","ai-import-body");

  // Drop zone
  var dropZone=el("div","ai-drop-zone");
  var fileInput=document.createElement("input");
  fileInput.type="file";fileInput.accept="image/*";
  var dropIcon=el("div","ai-drop-icon");dropIcon.textContent="📸";
  var dropTitle=el("p","ai-drop-title");dropTitle.textContent="Upload Recipe Screenshot";
  var dropSub=el("p","ai-drop-sub");dropSub.textContent="Take a photo or choose from your library";
  dropZone.append(fileInput,dropIcon,dropTitle,dropSub);

  var previewImg=document.createElement("img");
  previewImg.className="ai-preview-img";
  previewImg.style.display="none";
  body.append(dropZone,previewImg);

  var status=el("div","ai-status");
  body.appendChild(status);

  var footer=el("div","ai-import-footer");
  var cancelB=btn("Cancel","sbtn-cancel",function(){ss({showAiImport:false});});
  var extractB=btn("Extract & Fill","sbtn-ok",null);
  extractB.disabled=true;
  extractB.style.opacity="0.5";
  footer.append(cancelB,extractB);

  // State
  var imageBase64=null;

  function setStatus(msg,type){
    status.textContent=msg;
    status.className="ai-status visible"+(type?" "+type:"");
  }

  fileInput.onchange=function(e){
    var file=e.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      imageBase64=ev.target.result.split(",")[1];
      previewImg.src=ev.target.result;
      previewImg.style.display="block";
      dropZone.classList.add("has-image");
      dropIcon.textContent="✓";
      dropTitle.textContent=file.name;
      dropSub.textContent="Ready to extract";
      extractB.disabled=false;
      extractB.style.opacity="1";
      setStatus("Image loaded. Tap Extract to analyse with AI.","");
    };
    reader.readAsDataURL(file);
  };

  extractB.onclick=async function(){
    if(!imageBase64){setStatus("Please upload an image first.","error");return;}

    var apiKey=localStorage.getItem("anthropic_api_key")||"";
    if(!apiKey){
      apiKey=prompt("Enter your Anthropic API key (stored locally on this device only):");
      if(!apiKey){setStatus("API key required to extract recipes.","error");return;}
      localStorage.setItem("anthropic_api_key",apiKey.trim());
      apiKey=apiKey.trim();
    }

    extractB.disabled=true;extractB.textContent="Analysing...";
    setStatus("Sending to Claude AI — this takes about 10 seconds...","");

    var today=new Date().getDay();
    var dayIdx=today===0?6:today-1;
    var todayDay=DAYS[dayIdx];

    var prompt='You are a recipe extraction assistant. Analyse this recipe image and extract all information into a precise JSON object.\n\nRules:\n- Use ONLY these cuisine values: Peruvian, Mexican, Italian, Asian, American, Mediterranean, Middle Eastern, Other\n- Use ONLY these tag values (pick all that apply): High Protein, Quick, Meal Prep, Vegetarian, Vegan, Low Fat, Make Ahead, No Cook\n- Use ONLY these type values: Main Course, Breakfast, Appetizer, Side Dish, Dessert, Snack, Beverage, Other\n- schedule: set to ["'+todayDay+'"] as default\n- id: generate a short kebab-case string from the name (e.g. "chicken-tacos")\n- image: set to empty string ""\n- ingredients: object where keys are section names and values are arrays of ingredient strings\n- steps: array of strings, each a complete instruction\n- macros: object with calories, protein, carbs, fat as numbers, or null if not shown\n- CRITICAL: use plain ASCII fractions only: 1/2 not ½, 3/4 not ¾, 1/4 not ¼\n\nReturn ONLY valid JSON, no markdown, no explanation, no backticks. The JSON must match this exact structure:\n{"id":"","name":"","cuisine":"","tags":[],"type":"","schedule":[],"image":"","ingredients":{},"steps":[],"macros":null}';

    try{
      var response=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key":apiKey,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify({
          model:"claude-sonnet-4-5",
          max_tokens:2000,
          messages:[{
            role:"user",
            content:[
              {type:"image",source:{type:"base64",media_type:"image/jpeg",data:imageBase64}},
              {type:"text",text:prompt}
            ]
          }]
        })
      });

      if(!response.ok){
        var errData=await response.json();
        throw new Error(errData.error&&errData.error.message?errData.error.message:"API error "+response.status);
      }

      var data=await response.json();
      var raw=data.content.filter(function(c){return c.type==="text";}).map(function(c){return c.text;}).join("");
      // Strip any accidental markdown fences
      raw=raw.replace(/```json|```/g,"").trim();
      var recipe=JSON.parse(raw);

      // Validate required fields
      if(!recipe.name)throw new Error("Could not extract recipe name from image.");

      // Ensure id exists
      if(!recipe.id||recipe.id===""){
        recipe.id=recipe.name.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
      }
      // Ensure arrays
      if(!Array.isArray(recipe.tags))recipe.tags=[];
      if(!Array.isArray(recipe.steps))recipe.steps=[];
      if(!Array.isArray(recipe.schedule))recipe.schedule=[todayDay];

      setStatus("✦ Extracted: "+recipe.name+" — opening editor...","success");

      setTimeout(function(){
        ss({showAiImport:false,showEditor:true,editingRecipe:recipe});
      },800);

    } catch(err){
      var msg=err.message||"Load failed";
      if(msg.includes("401")||msg.includes("invalid_api_key")||msg.includes("authentication")){
        localStorage.removeItem("anthropic_api_key");
        msg="Invalid API key — it has been cleared. Try again to re-enter it.";
      }
      setStatus("Error: "+msg,"error");
      extractB.disabled=false;extractB.textContent="Extract & Fill";
    }
  };

  sheet.append(handle,hdr,body,footer);
  ov.appendChild(sheet);
  ov.onclick=function(e){if(e.target===ov)ss({showAiImport:false});};
  return ov;
}

// ── DEV VIEW ───────────────────────────────────────────────
function buildDevView(){

  var hdr=el("div","dev-view-hdr");

  var selectedId=null;

  // Detail panel
  var panel=el("div","dev-detail-panel");
  ov.appendChild(panel); // added to ov, not graphWrap, so it stays fixed

  // Node definitions
  var NODES=[
    {id:"entry",    label:"index.html",  sub:"app entry point", color:"gold",  col:0,

     actions:[]},
    {id:"pwa",      label:"PWA",         sub:"manifest.json",   color:"dim",   col:0,

     actions:[]},
    {id:"supabase", label:"Supabase DB",  sub:"recipes table",   color:"green", col:1,
     desc:"Postgres database. Table: recipes. All recipe JSON stored here. Connected via anon public key.",
     actions:[{label:"Refresh now",color:"green",fn:function(){ss({showDevView:false});doRefresh(null);showToast("Refreshed from Supabase");}}]},
    {id:"sbfetch",  label:"sbFetch()",   sub:"GET /recipes",    color:"green", col:1,
     desc:"Fetches all recipes ordered by created_at. Returns array or null on failure.",
     actions:[{label:"Run fetch",color:"green",fn:async function(){var r=await sbFetch();showToast(r?"Fetched "+r.length+" recipes":"Fetch failed");}}]},
    {id:"sbwrite",  label:"sbInsert / Update / Delete", sub:"POST · PATCH · DELETE", color:"green", col:1,
     desc:"Write operations. sbInsert uses merge-duplicates. sbUpdate strips id/created_at and uses Prefer:return=minimal. sbDelete uses Prefer:return=minimal.",
     actions:[]},
    {id:"sbkey",    label:"SB_KEY",      sub:"anon public",     color:"dim",   col:1,
     desc:"Supabase anon key — embedded in the app. Sent as apikey + Authorization Bearer on every request.",
     actions:[]},
    {id:"state",    label:"State S",     sub:"single object",   color:"blue",  col:2,
     desc:"Single source of truth. Contains: recipes[], view, selected, isAdmin, filters, modal flags. All updates go through ss() → render().",
     actions:[]},
    {id:"ss",       label:"ss(update)",  sub:"setState + render",color:"blue", col:2,
     desc:"Merges update into S with Object.assign, then calls render(). Every user action calls this.",
     actions:[]},
    {id:"render",   label:"render()",    sub:"full re-render",  color:"blue",  col:2,
     desc:"Wipes #app innerHTML, rebuilds header + main + bnav + any open modals from current S. Called after every ss().",
     actions:[]},
    {id:"home",     label:"Home",        sub:"S.view==='home'",  color:"gold",  col:3,
     desc:"Week strip (ordered from today) + saved recipes list. Admin bar shows AI Import + Dev View when active.",
     actions:[{label:"Go to Home",color:"gold",fn:function(){ss({showDevView:false,view:"home",selected:null});}}]},
    {id:"recipes",  label:"Recipes Grid",sub:"S.view==='recipes'",color:"gold", col:3,
     desc:"2-column grid. Search + cuisine/tag filter chips in header. Tap card → detail.",
     actions:[{label:"Go to Recipes",color:"gold",fn:function(){ss({showDevView:false,view:"recipes",selected:null});}}]},
    {id:"detail",   label:"Detail",      sub:"S.view==='detail'",color:"gold",  col:3,
     desc:"Full recipe view. Hero image, macros grid, interactive schedule pills (saves to Supabase on tap). Edit/Delete in admin.",
     actions:[]},
    {id:"planner",  label:"Planner",     sub:"S.view==='planner'",color:"purple",col:3,
     desc:"Full week view from today. Each day lists scheduled recipes. Tap to open detail.",
     actions:[{label:"Go to Planner",color:"purple",fn:function(){ss({showDevView:false,view:"planner"});}}]},
    {id:"aiimport", label:"AI Import",   sub:"Claude Vision API",color:"gold",  col:4,
     desc:"Upload recipe screenshot → sent to claude-sonnet-4-20250514 with vision → JSON extracted → editor pre-filled. Runs via Anthropic API.",
     actions:[{label:"Open AI Import",color:"gold",fn:function(){ss({showDevView:false,showAiImport:true});}}]},
    {id:"editor",   label:"Recipe Editor",sub:"add / edit",     color:"blue",  col:4,
     desc:"Full recipe form. Name, image, cuisine, type, tags, schedule, sectioned ingredients, steps, macros. Saves via sbInsert or sbUpdate.",
     actions:[{label:"New Recipe",color:"blue",fn:function(){ss({showDevView:false,showEditor:true,editingRecipe:null});}}]},
    {id:"urlimport",label:"URL Import",  sub:"?recipe= param",  color:"green", col:4,
     desc:"On init, checks for ?recipe= in URL. base64 decodes JSON, inserts to Supabase if not duplicate. Used in Claude chat workflow.",
     actions:[]},
    {id:"refresh",  label:"Refresh",     sub:"header btn + pull",color:"blue", col:4,
     desc:"Header button triggers doRefresh(). Pull-to-refresh detects touchstart at scrollY=0 and triggers on 60px+ pull. Both call sbFetch().",
     actions:[{label:"Refresh now",color:"blue",fn:function(){ss({showDevView:false});doRefresh(null);}}]},
  ];

  var CONNECTIONS=[
    ["entry","supabase","#1a3a22"],
    ["entry","state","#0f2040"],
    ["sbkey","sbfetch","#2a2a00"],
    ["sbkey","sbwrite","#2a2a00"],
    ["supabase","sbfetch","#4caf72"],
    ["supabase","sbwrite","#4caf72"],
    ["sbfetch","state","#6490dc"],
    ["sbwrite","state","#6490dc"],
    ["state","ss","#6490dc"],
    ["ss","render","#6490dc"],
    ["render","home","#c8a96e"],
    ["render","recipes","#c8a96e"],
    ["render","detail","#c8a96e"],
    ["render","planner","#a06ee0"],
    ["aiimport","editor","#c8a96e"],
    ["editor","sbwrite","#4caf72"],
    ["urlimport","sbwrite","#4caf72"],
    ["urlimport","state","#6490dc"],
    ["refresh","sbfetch","#4caf72"],
    ["home","aiimport","#c8a96e"],
    ["detail","editor","#6490dc"],
    ["detail","sbwrite","#4caf72"],
  ];

  var cols=[0,1,2,3,4];
  var colLabels=["Entry","Data","State","Views","Features"];
  var colEls=[];

  cols.forEach(function(ci){
    var colWrap=el("div");
    colWrap.style.cssText="display:flex;flex-direction:column;gap:0;";
    var colHdr=el("div","dev-col-hdr");colHdr.textContent=colLabels[ci];
    colWrap.appendChild(colHdr);
    var col=el("div","dev-col");
    colEls.push(col);
    colWrap.appendChild(col);
    graph.appendChild(colWrap);
    if(ci<4){var gap=el("div","dev-col-gap");graph.appendChild(gap);}
  });

  NODES.forEach(function(nd){
    var node=el("div","dev-node "+nd.color);
    node.dataset.id=nd.id;
    var lbl=el("div","dev-node-label");lbl.textContent=nd.label;
    var sub=el("div","dev-node-sub");sub.textContent=nd.sub;
    var hasDot=CONNECTIONS.some(function(c){return c[0]===nd.id;});
    var hasInDot=CONNECTIONS.some(function(c){return c[1]===nd.id;});
    node.append(lbl,sub);
    if(hasDot){var dot=el("span","dev-node-dot");node.appendChild(dot);}
    if(hasInDot&&nd.col>0){var dotL=el("span","dev-node-dot-left");node.appendChild(dotL);}
    node.onclick=function(e){
      e.stopPropagation();
      graph.querySelectorAll(".dev-node").forEach(function(n){n.classList.remove("selected");});
      if(selectedId===nd.id){
        selectedId=null;
        panel.classList.remove("open");
        panel.innerHTML="";
      } else {
        selectedId=nd.id;
        node.classList.add("selected");
        showPanel(nd);
        drawLines();
      }
    };
    colEls[nd.col].appendChild(node);
    nodeEls[nd.id]=node;
  });

  graphWrap.appendChild(graph);

  function showPanel(nd){
    panel.innerHTML="";
    var nm=el("div","dev-detail-name");nm.textContent=nd.label;
    var fl=el("div","dev-detail-file");fl.textContent=nd.sub;
    var desc=el("div","dev-detail-desc");desc.textContent=nd.desc;
    panel.append(nm,fl,desc);
    if(nd.actions&&nd.actions.length){
      var acts=el("div","dev-detail-actions");
      nd.actions.forEach(function(a){
        var b=el("button","dev-action-btn");
        b.textContent=a.label;
        var colorMap={gold:"#c8a96e",blue:"#6490dc",green:"#4caf72",purple:"#a06ee0",red:"#e05555"};
        var c=colorMap[a.color]||"#c8a96e";
        b.style.cssText="color:"+c+";border-color:"+c+"33;background:"+c+"11;";
        b.onclick=a.fn;
        acts.appendChild(b);
      });
      panel.appendChild(acts);
    }
    panel.classList.add("open");
  }

  graphWrap.onclick=function(){
    selectedId=null;
    panel.classList.remove("open");
    graph.querySelectorAll(".dev-node").forEach(function(n){n.classList.remove("selected");});
    drawLines();
  };

  function drawLines(){
    var wRect=graphWrap.getBoundingClientRect();
    var scrollLeft=graphWrap.scrollLeft;
    var scrollTop=graphWrap.scrollTop;
    var totalW=graph.scrollWidth;
    var totalH=graph.scrollHeight;
    svg.setAttribute("width",totalW);
    svg.setAttribute("height",totalH);
    svg.setAttribute("viewBox","0 0 "+totalW+" "+totalH);
    svg.innerHTML="";

    CONNECTIONS.forEach(function(conn){
      var fromId=conn[0];var toId=conn[1];var color=conn[2];
      var fromEl=nodeEls[fromId];var toEl=nodeEls[toId];
      if(!fromEl||!toEl)return;

      var fRect=fromEl.getBoundingClientRect();
      var tRect=toEl.getBoundingClientRect();

      var fx=fRect.right-wRect.left+scrollLeft;
      var fy=fRect.top+fRect.height/2-wRect.top+scrollTop;
      var tx=tRect.left-wRect.left+scrollLeft;
      var ty=tRect.top+tRect.height/2-wRect.top+scrollTop;

      var cp=Math.abs(tx-fx)*0.45;
      var isSelected=(selectedId===fromId||selectedId===toId);
      var opacity=selectedId?(isSelected?"1":"0.08"):"0.35";
      var strokeW=isSelected?"1.5":"0.8";

      var path=document.createElementNS("http://www.w3.org/2000/svg","path");
      path.setAttribute("d","M "+fx+" "+fy+" C "+(fx+cp)+" "+fy+", "+(tx-cp)+" "+ty+", "+tx+" "+ty);
      path.setAttribute("fill","none");
      path.setAttribute("stroke",color);
      path.setAttribute("stroke-width",strokeW);
      path.setAttribute("opacity",opacity);
      svg.appendChild(path);
    });
  }

  setTimeout(drawLines,60);
  graphWrap.addEventListener("scroll",drawLines,{passive:true});

  ov.appendChild(graphWrap);
  return ov;
}

// ── DELETE ─────────────────────────────────────────────────
async function confirmDelete(id){
  if(confirm("Delete this recipe?")){
    const ok=await sbDelete(id);
    if(ok){
      const recipes=await sbFetch();
      ss({recipes:recipes||S.recipes,view:"home",selected:null});
      showToast("Recipe deleted");
    } else {
      showToast("Failed to delete — check Supabase permissions");
    }
  }
}

// ── PULL TO REFRESH ────────────────────────────────────────
function initPullToRefresh(){
  var ptr=document.getElementById("ptr-indicator");
  var startY=0;
  var currentY=0;

  window.addEventListener("touchstart",function(e){
    if(window.scrollY===0){startY=e.touches[0].pageY;}
    else{startY=0;}
  },{passive:true});

  window.addEventListener("touchmove",function(e){
    if(startY===0)return;
    currentY=e.touches[0].pageY;
    var diff=currentY-startY;
    if(diff>0&&diff<80){
      ptr.style.transform="translateY("+(diff-50)+"px)";
      ptr.style.opacity=String(diff/80);
      ptr.textContent=diff>60?"Release to refresh":"Pull to refresh";
    }
  },{passive:true});

  window.addEventListener("touchend",async function(){
    var diff=currentY-startY;
    startY=0;currentY=0;
    if(diff>60){
      ptr.textContent="Refreshing...";
      ptr.style.transform="translateY(0px)";
      var fresh=await sbFetch();
      if(fresh)ss({recipes:fresh});
      showToast("✦ Refreshed");
      setTimeout(function(){ptr.style.transform="translateY(-50px)";ptr.style.opacity="0";},700);
    } else {
      ptr.style.transform="translateY(-50px)";
      ptr.style.opacity="0";
    }
  });
}

// ── INIT ───────────────────────────────────────────────────
async function init(){
  render();
  initPullToRefresh();
  var recipes=await sbFetch();
  if(!recipes||recipes.length===0){await sbSeed();recipes=await sbFetch();}
  recipes=await checkUrlImport(recipes||[]);
  ss({recipes:recipes||[],loading:false});
}

init();
